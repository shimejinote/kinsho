<!DOCTYPE html>
<html lang="ja">
<head>

  <title>BRAIN MAKER · kinsho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060a12;
      --bg-mid: #0a1220;
      --panel: rgba(6, 10, 18, 0.94);
      --cyan: #3de7ff;
      --magenta: #ff3d9a;
      --green: #5dffb0;
      --holo: #7af0ff;
      --holo-dim: rgba(61, 231, 255, 0.14);
      --holo-faint: rgba(61, 231, 255, 0.06);
      --text: #e8f7ff;
      --muted: #6a8a98;
      --line: rgba(61, 231, 255, 0.32);
      --nav-w: min(420px, 92vw);
      --accent-warm: rgba(255, 61, 154, 0.28);
      --accent-cool: rgba(61, 231, 255, 0.32);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", sans-serif;
      touch-action: none;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
      height: 100dvh;
      min-height: 100svh;
    }
    .bg-field {
      position: absolute; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
      background:
        radial-gradient(ellipse 55% 38% at 50% 48%, rgba(8, 28, 48, 0.55) 0%, transparent 70%),
        radial-gradient(ellipse 70% 50% at 12% 8%, var(--accent-warm), transparent 55%),
        radial-gradient(ellipse 65% 48% at 90% 12%, var(--accent-cool), transparent 58%),
        radial-gradient(ellipse 50% 40% at 78% 88%, rgba(255, 61, 154, 0.14), transparent 65%),
        linear-gradient(180deg, #050810 0%, #0a1422 42%, #0c1a2a 100%);
    }
    .bg-pattern-layer {
      position: absolute; inset: 0;
      opacity: 1;
    }
    .bg-pattern-layer::after {
      content: "";
      position: absolute; inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent 0,
        transparent 3px,
        rgba(61, 231, 255, 0.035) 3px,
        rgba(61, 231, 255, 0.035) 4px
      );
      animation: bg-scan-drift 9s linear infinite;
      opacity: 0.85;
      mix-blend-mode: screen;
    }
    .bg-pattern-layer svg {
      position: absolute; display: block;
      overflow: visible;
    }
    .bg-pattern-layer .bg-overlay {
      inset: 0; width: 100%; height: 100%;
      opacity: 0.72;
    }
    .bg-pattern-layer .bg-soft-mask {
      -webkit-mask-image: radial-gradient(ellipse 78% 68% at 50% 42%, black 18%, transparent 88%);
      mask-image: radial-gradient(ellipse 78% 68% at 50% 42%, black 18%, transparent 88%);
    }
    .bg-pattern-layer .bg-breathe .node-pulse {
      animation: bg-breathe 5.5s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
    .bg-pattern-layer .bg-focus-halo {
      animation: bg-focus-halo 7s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
    .bg-pattern-layer .bg-grid-pulse {
      animation: bg-grid-pulse 6s ease-in-out infinite;
    }
    .bg-pattern-layer .bg-scan-beam {
      animation: bg-scan-beam 5.5s linear infinite;
    }
    .bg-pattern-layer text {
      font-family: Orbitron, "IBM Plex Sans", "Segoe UI", sans-serif;
      letter-spacing: 0.08em;
      user-select: none;
    }
    @keyframes bg-breathe {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }
    @keyframes bg-focus-halo {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.9; }
    }
    @keyframes bg-grid-pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.85; }
    }
    @keyframes bg-scan-beam {
      0% { transform: translateY(-120%); opacity: 0; }
      8% { opacity: 0.7; }
      92% { opacity: 0.55; }
      100% { transform: translateY(120%); opacity: 0; }
    }
    @keyframes bg-scan-drift {
      0% { background-position: 0 0; }
      100% { background-position: 0 80px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .bg-pattern-layer .bg-breathe .node-pulse,
      .bg-pattern-layer .bg-focus-halo,
      .bg-pattern-layer .bg-grid-pulse,
      .bg-pattern-layer .bg-scan-beam,
      .bg-pattern-layer::after {
        animation: none;
      }
    }

    #canvas-wrap {
      position: absolute; inset: 0;
      overflow: hidden;
      z-index: 1;
      background: transparent;
      touch-action: none;
    }
    #canvas-wrap::before,
    #canvas-wrap::after { content: none; display: none; }
    canvas {
      display: block; width: 100%; height: 100%; position: relative; z-index: 1;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .scanlines { display: none; }
    .vignette {
      pointer-events: none; position: absolute; inset: 0; z-index: 2;
      box-shadow:
        inset 0 0 70px 20px rgba(4, 6, 10, 0.18),
        inset 0 0 0 1px rgba(154, 212, 200, 0.05);
    }
    .combine-flash {
      pointer-events: none; position: absolute; inset: 0; z-index: 3;
      opacity: 0; mix-blend-mode: screen;
      transition: opacity 0.08s linear;
    }
    .combine-flash.on {
      opacity: 1;
      background: radial-gradient(circle at 50% 45%, rgba(200, 255, 255, 0.55), rgba(61, 231, 255, 0.2) 40%, transparent 68%);
    }
    .combine-flash.arc {
      opacity: 1;
      background:
        linear-gradient(to bottom,
          transparent 0%,
          transparent calc(var(--scan-y, 50%) - 1.2%),
          rgba(180, 255, 255, 0.55) calc(var(--scan-y, 50%) - 0.15%),
          rgba(61, 231, 255, 0.9) var(--scan-y, 50%),
          rgba(180, 255, 255, 0.35) calc(var(--scan-y, 50%) + 0.15%),
          rgba(61, 231, 255, 0.08) calc(var(--scan-y, 50%) + 8%),
          transparent calc(var(--scan-y, 50%) + 22%)
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(61, 231, 255, 0.04) 3px,
          rgba(61, 231, 255, 0.04) 4px
        );
    }
    .combine-flash.complete {
      opacity: 1;
      background: radial-gradient(circle at 50% 45%, rgba(210, 255, 255, 0.65), rgba(61, 231, 255, 0.25) 45%, transparent 70%);
    }

    header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 5;
      padding:
        max(1.2rem, calc(env(safe-area-inset-top) + 0.55rem))
        max(1.5rem, calc(env(safe-area-inset-right) + 0.75rem))
        0.75rem
        max(1.5rem, calc(env(safe-area-inset-left) + 0.75rem));
      display: flex; justify-content: flex-start; gap: 1rem;
      pointer-events: none;
    }
    .brand { pointer-events: auto; }
    .brand h1 {
      font-family: Orbitron, sans-serif; font-size: clamp(1.05rem, 2.5vw, 1.7rem);
      letter-spacing: 0.12em; color: var(--holo);
      text-shadow: 0 0 14px rgba(154, 212, 200, 0.28);
    }
    .brand p { margin-top: 0.3rem; color: var(--muted); font-size: 0.88rem; max-width: 28rem; line-height: 1.45; }

    .controls {
      position: absolute; z-index: 5; left: 50%;
      bottom: max(1.1rem, calc(env(safe-area-inset-bottom) + 0.55rem));
      transform: translateX(-50%);
      width: min(760px, calc(100% - 1.5rem));
      max-height: min(42vh, 420px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
      background: var(--panel); border: 1px solid var(--line);
      backdrop-filter: blur(12px);
      padding: 0.55rem 0.75rem 0.85rem;
      pointer-events: auto;
      transition: max-height 0.22s ease, padding 0.22s ease, width 0.22s ease;
    }
    .controls.is-collapsed {
      width: min(420px, calc(100% - 1.5rem));
      max-height: 3.4rem;
      overflow: hidden;
      padding: 0.4rem 0.55rem;
    }
    .controls-chrome {
      display: flex; align-items: center; gap: 0.45rem;
      min-height: 2.1rem;
    }
    .btn-hud-toggle {
      flex: 0 0 auto; min-width: 2.2rem; width: 2.2rem;
      padding: 0.45rem 0.25rem; font-size: 0.85rem; letter-spacing: 0;
      line-height: 1; color: var(--holo);
      border-color: rgba(126, 200, 196, 0.35);
      background: rgba(126, 200, 196, 0.08);
    }
    .btn-hud-toggle:hover { border-color: var(--cyan); color: var(--cyan); }
    .controls-chrome-actions {
      display: none; flex: 1; gap: 0.35rem; min-width: 0;
    }
    .controls.is-collapsed .controls-chrome-actions { display: flex; }
    .controls-chrome-actions button {
      flex: 1; min-width: 0; padding: 0.5rem 0.35rem; font-size: 0.55rem;
    }
    .controls-body {
      margin-top: 0.45rem;
    }
    .controls.is-collapsed .controls-body { display: none; }
    .controls h2 {
      font-family: Orbitron, sans-serif; font-size: 0.58rem; letter-spacing: 0.14em;
      color: var(--magenta); margin-bottom: 0.45rem;
    }
    .controls h2 span { color: var(--cyan); }
    .controls-status {
      display: flex; align-items: center; gap: 0.65rem;
      margin-bottom: 0.55rem;
    }
    .hud-bar-status {
      flex: 1 1 auto; min-width: 0; max-width: none;
      font-family: Orbitron, sans-serif; font-size: 0.55rem;
      letter-spacing: 0.1em; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .controls.is-collapsed .hud-bar-status { flex: 0 1 auto; max-width: 28%; }
    .controls-status .progress { flex: 1; margin-top: 0; min-width: 60px; }
    .btn-row { display: flex; gap: 0.45rem; flex-wrap: wrap; }
    button {
      appearance: none; cursor: pointer; flex: 1; min-width: 100px;
      font-family: Orbitron, sans-serif; font-size: 0.62rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text);
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
      padding: 0.7rem 0.5rem; transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    button:hover { border-color: var(--cyan); color: var(--cyan); }
    button.primary {
      border-color: var(--cyan); background: rgba(126, 200, 196, 0.14); color: var(--holo);
      box-shadow: 0 0 16px rgba(126, 200, 196, 0.12);
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .palette-toolbar {
      display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap;
      margin: 0.55rem 0 0.4rem; color: var(--muted); font-size: 0.75rem;
    }
    .palette-toolbar select {
      appearance: none;
      font-family: Orbitron, sans-serif; font-size: 0.58rem; letter-spacing: 0.08em;
      color: var(--text); background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14); padding: 0.4rem 0.5rem;
    }
    .look-toolbar {
      display: flex; gap: 0.4rem; flex-wrap: wrap;
      margin: 0 0 0.4rem;
    }
    .look-toolbar button {
      flex: 1; min-width: 0; padding: 0.5rem 0.45rem; font-size: 0.55rem;
    }
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.35rem;
    }
    .palette-grid.is-muted {
      opacity: 0.45;
      pointer-events: none;
    }
    .palette-item {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 0.22rem 0.35rem;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2); padding: 0.3rem 0.4rem;
    }
    .palette-item label {
      font-size: 0.68rem; color: var(--muted);
      text-transform: capitalize; letter-spacing: 0.02em;
    }
    .palette-item input[type="color"] {
      width: 26px; height: 20px; border: none; padding: 0; background: transparent; cursor: pointer;
      justify-self: end;
    }
    .palette-item .dens-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 2.2rem;
      align-items: center;
      gap: 0.3rem;
    }
    .palette-item .dens-row input[type="range"] {
      width: 100%;
      accent-color: var(--cyan);
    }
    .palette-item .dens-row .val {
      font-family: Orbitron, sans-serif;
      font-size: 0.5rem;
      color: var(--cyan);
      text-align: right;
    }
    .loader {
      position: absolute; inset: 0; z-index: 4; display: grid; place-items: center;
      background: rgba(5,8,12,0.55); transition: opacity 0.4s;
    }
    .loader.hide { opacity: 0; pointer-events: none; }
    .loader-inner {
      text-align: center; font-family: Orbitron, sans-serif;
      letter-spacing: 0.18em; font-size: 0.72rem; color: var(--cyan);
    }
    .bar { margin: 0.9rem auto 0; width: 180px; height: 2px; background: rgba(61,231,255,0.15); overflow: hidden; }
    .bar > i { display: block; height: 100%; width: 40%; background: var(--cyan); animation: slide 1.1s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(280%); } }

    @media (max-width: 640px) {
      .brand h1 { font-size: clamp(0.95rem, 5.2vw, 1.25rem); letter-spacing: 0.1em; }
      .brand p { display: none; }
      .btn-row { flex-direction: column; }
      button {
        min-width: 0;
        min-height: 44px;
        padding: 0.85rem 0.65rem;
        font-size: 0.68rem;
      }
      .btn-hud-toggle { min-width: 44px; width: 44px; min-height: 44px; }
      .controls-chrome-actions button { min-height: 40px; font-size: 0.58rem; }
      .palette-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .controls {
        width: min(100%, calc(100% - 0.75rem));
        max-height: min(52dvh, 480px);
        bottom: max(0.55rem, env(safe-area-inset-bottom));
      }
      .controls.is-collapsed {
        width: min(100%, calc(100% - 0.75rem));
        max-height: 3.6rem;
      }
      .callout { width: min(168px, 42vw); }
      .callout-panel { padding: 0.45rem 0.5rem 0.5rem; }
      .callout-panel h3 { font-size: 0.72rem; }
      .callout-panel p { font-size: 0.62rem; line-height: 1.35; }
      .hud-bar-status { font-size: 0.5rem; }
    }

    @media (max-width: 640px) and (orientation: landscape) {
      .brand p { display: none; }
      header { padding-top: max(0.45rem, env(safe-area-inset-top)); }
      .controls { max-height: min(62dvh, 320px); }
      .controls.is-collapsed { max-height: 3.2rem; }
    }

    /* —— cyberpunk callouts (3D CSS2D) —— */
    #callout-layer {
      position: absolute; inset: 0; z-index: 3;
      pointer-events: none; overflow: hidden;
    }
    .callout {
      width: min(210px, 46vw);
      pointer-events: auto;
      cursor: pointer;
      opacity: 0;
      filter: drop-shadow(0 0 12px rgba(61, 231, 255, 0.22));
      transition: opacity 0.45s ease, filter 0.2s ease;
      will-change: opacity;
    }
    .callout.visible { opacity: 1; }
    .callout:hover .callout-panel {
      border-color: rgba(61, 231, 255, 0.85);
      box-shadow: 0 0 18px rgba(61, 231, 255, 0.2);
    }
    .callout.focused .callout-panel {
      border-color: rgba(61, 255, 138, 0.75);
      box-shadow: 0 0 22px rgba(61, 255, 138, 0.25);
    }
    .callout-shift {
      --depth-scale: 1;
      --depth-opacity: 1;
      --depth-blur: 0px;
      transform: translateY(calc(-100% - 10px)) scale(var(--depth-scale));
      opacity: var(--depth-opacity);
      filter: blur(var(--depth-blur));
      transform-origin: 50% 100%;
    }
    .callout-panel {
      position: relative;
      background:
        linear-gradient(135deg, rgba(8, 22, 32, 0.94), rgba(4, 12, 18, 0.9)),
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(61,231,255,0.03) 3px, rgba(61,231,255,0.03) 4px);
      border: 1px solid rgba(61, 231, 255, 0.45);
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      padding: 0.55rem 0.65rem 0.6rem;
      backdrop-filter: blur(10px);
    }
    .callout-panel::before {
      content: "";
      position: absolute; top: 0; right: 0;
      width: 12px; height: 12px;
      background: linear-gradient(135deg, transparent 50%, rgba(61, 231, 255, 0.85) 50%);
    }
    .callout-panel::after {
      content: "";
      position: absolute; left: 0; bottom: 0;
      width: 12px; height: 12px;
      background: linear-gradient(315deg, transparent 50%, rgba(255, 45, 149, 0.75) 50%);
    }
    .callout-tag {
      font-family: Orbitron, sans-serif;
      font-size: 0.5rem; letter-spacing: 0.14em;
      color: var(--cyan); margin-bottom: 0.22rem;
      text-shadow: 0 0 8px rgba(61,231,255,0.45);
    }
    .callout-panel h3 {
      font-family: Orbitron, sans-serif;
      font-size: 0.72rem; letter-spacing: 0.08em;
      color: var(--text); margin-bottom: 0.28rem;
    }
    .callout-panel p {
      font-size: 0.68rem; line-height: 1.4; color: var(--muted);
    }
    .callout-meta {
      margin-top: 0.35rem; padding-top: 0.3rem;
      border-top: 1px solid rgba(61, 231, 255, 0.15);
      font-family: Orbitron, sans-serif;
      font-size: 0.46rem; letter-spacing: 0.1em;
      color: rgba(61, 231, 255, 0.7);
    }
    .callout[data-region="limbic"] .callout-panel { border-color: rgba(255, 45, 149, 0.55); }
    .callout[data-region="limbic"] .callout-tag { color: var(--magenta); }
    .callout[data-region="basal"] .callout-panel { border-color: rgba(192, 132, 255, 0.55); }
    .callout[data-region="thalamus"] .callout-panel { border-color: rgba(125, 255, 179, 0.5); }
    .callout[data-region="cerebellum"] .callout-panel { border-color: rgba(255, 179, 71, 0.55); }
    .callout[data-region="brainstem"] .callout-panel { border-color: rgba(110, 168, 255, 0.55); }
    .callout[data-region="ventricle"] .callout-panel { border-color: rgba(232, 247, 255, 0.4); }
    .callout[data-region="white"] .callout-panel { border-color: rgba(240, 230, 255, 0.45); }

    function createCircuitTexture() {
      const size = 512;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, size, size);

      // グリッド
      ctx.strokeStyle = "rgba(80, 200, 255, 0.28)";
      ctx.lineWidth = 1;
      const step = 32;
      for (let i = 0; i <= size; i += step) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, size);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(size, i);
        ctx.stroke();
      }

      // マンハッタン回路トレース
      for (let i = 0; i < 55; i++) {
        ctx.strokeStyle = `rgba(120, 240, 255, ${0.45 + Math.random() * 0.55})`;
        ctx.lineWidth = 1 + Math.random() * 1.8;
        let x = Math.floor(Math.random() * (size / step)) * step;
        let y = Math.floor(Math.random() * (size / step)) * step;
        ctx.beginPath();
        ctx.moveTo(x, y);
        const turns = 3 + Math.floor(Math.random() * 6);
        for (let t = 0; t < turns; t++) {
          if (Math.random() > 0.5) x += (Math.random() > 0.5 ? 1 : -1) * step * (1 + Math.floor(Math.random() * 3));
          else y += (Math.random() > 0.5 ? 1 : -1) * step * (1 + Math.floor(Math.random() * 3));
          x = Math.max(0, Math.min(size, x));
          y = Math.max(0, Math.min(size, y));
          ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      // ノード
      for (let i = 0; i < 70; i++) {
        const x = Math.floor(Math.random() * (size / step)) * step;
        const y = Math.floor(Math.random() * (size / step)) * step;
        ctx.fillStyle = `rgba(180, 255, 255, ${0.5 + Math.random() * 0.5})`;
        ctx.beginPath();
        ctx.arc(x, y, 1.5 + Math.random() * 2.5, 0, Math.PI * 2);
        ctx.fill();
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.NoColorSpace;
      tex.needsUpdate = true;
      return tex;
    }

    const REGION_PUSH = {
      cortex: 2.55,
      cerebellum: 2.45,
      limbic: 2.25,
      basal: 2.15,
      thalamus: 2.1,
      brainstem: 2.4,
      ventricle: 2.05,
      white: 2.3,
      other: 2.35,
    };

    // 解剖的な外側バイアス（中心付近の部位が重ならないよう）
    const REGION_BIAS = {
      cortex: new THREE.Vector3(0.15, 0.85, 0.25),
      limbic: new THREE.Vector3(0.55, 0.1, 0.35),
      basal: new THREE.Vector3(-0.55, 0.05, 0.2),
      thalamus: new THREE.Vector3(0.0, 0.35, 0.15),
      cerebellum: new THREE.Vector3(0.05, -0.55, -0.95),
      brainstem: new THREE.Vector3(0.0, -1.0, -0.15),
      ventricle: new THREE.Vector3(-0.25, 0.55, -0.1),
      white: new THREE.Vector3(0.7, 0.2, -0.35),
      other: new THREE.Vector3(-0.7, -0.15, 0.55),
    };

    const callouts = {
      locked: false,
      settled: false,
      revealT0: 0,
      root: null,
      nodes: new Map(),
      _world: new THREE.Vector3(),
      _center: new THREE.Vector3(),
      _dir: new THREE.Vector3(),
      _mid: new THREE.Vector3(),
      _label: new THREE.Vector3(),
      _box: new THREE.Box3(),
      _size: new THREE.Vector3(),
      _proj: new THREE.Vector3(),
      radius: 1,
      focusRegion: null,
    };

    const camFocus = {
      active: false,
      t0: 0,
      duration: 1.15,
      fromPos: new THREE.Vector3(),
      toPos: new THREE.Vector3(),
      fromTarget: new THREE.Vector3(),
      toTarget: new THREE.Vector3(),
    };

    let loreOverrides = {};

    function loreFor(region) {
      const base = REGION_LORE[region] || REGION_LORE.other;
      const over = loreOverrides[region];
      return over ? { ...base, ...over } : base;
    }

    function clearCalloutRig() {
      if (!callouts.root) return;
      callouts.root.parent?.remove(callouts.root);
      for (const node of callouts.nodes.values()) {
        node.line.geometry.dispose();
        node.line.material.dispose();
        node.glow.geometry.dispose();
        node.glow.material.dispose();
        node.dot.geometry.dispose();
        node.dot.material.dispose();
      }
      callouts.nodes.clear();
      callouts.root = null;
    }

    function rebuildRegionAnchors() {
      // 脳全体の中心
      callouts._center.set(0, 0, 0);
      const perRegion = new Map(); // region -> THREE.Vector3[]
      let n = 0;
      let maxR = 0.35;

      for (const part of parts) {
        if (!part.mesh) continue;
        const region = part.region || "other";
        callouts._box.setFromObject(part.mesh);
        callouts._box.getCenter(callouts._world);
        callouts._center.add(callouts._world);
        n += 1;
        if (!perRegion.has(region)) perRegion.set(region, []);
        perRegion.get(region).push(callouts._world.clone());
      }
      if (!n) return new Map();
      callouts._center.multiplyScalar(1 / n);
      const center = callouts._center;

      // 部位中心の平均だと球対称で中央に寄る → 外側の代表点を選ぶ
      const anchors = new Map();
      for (const [region, centers] of perRegion) {
        const bias = REGION_BIAS[region] || REGION_BIAS.other;
        const biasN = bias.clone().normalize();
        let best = null;
        let bestScore = -Infinity;
        let dirAcc = new THREE.Vector3();
        let dirW = 0;

        for (const c of centers) {
          callouts._dir.copy(c).sub(center);
          const dist = callouts._dir.length();
          maxR = Math.max(maxR, dist);
          if (dist < 1e-6) continue;
          callouts._dir.multiplyScalar(1 / dist);
          const align = Math.max(0, callouts._dir.dot(biasN));
          // 遠い + バイアス方向に近いメッシュを優先
          const score = dist * (0.4 + 0.6 * align);
          if (score > bestScore) {
            bestScore = score;
            best = c;
          }
          dirAcc.addScaledVector(callouts._dir, dist);
          dirW += dist;
        }

        if (!best) {
          // フォールバック: バイアス方向の仮想点
          best = center.clone().addScaledVector(biasN, maxR * 0.85);
        } else if (dirW > 1e-6) {
          // 代表点を「表面寄り」へ：中心→方向の最大距離付近
          dirAcc.multiplyScalar(1 / dirW).normalize();
          const surfaceDist = Math.max(
            best.distanceTo(center),
            maxR * 0.72
          );
          best = center.clone().addScaledVector(dirAcc, surfaceDist);
          // バイアスで少し振る
          best.addScaledVector(biasN, maxR * 0.12);
        }

        anchors.set(region, best);
        maxR = Math.max(maxR, best.distanceTo(center));
      }

      callouts.radius = maxR;
      return anchors;
    }

    function makeCalloutElement(region) {
      const lore = loreFor(region);
      const el = document.createElement("div");
      el.className = "callout";
      el.dataset.region = region;
      el.title = "クリックでフォーカス";
      el.style.transitionDelay = `${Math.max(0, REGION_KEYS.indexOf(region)) * 0.08}s`;
      el.innerHTML = `
        <div class="callout-shift">
          <div class="callout-panel">
            <div class="callout-tag">${lore.code}</div>
            <h3>${lore.title}</h3>
            <p>${lore.blurb}</p>
            <div class="callout-meta">CLUSTER · ${region.toUpperCase()} · CLICK TO FOCUS</div>
          </div>
        </div>`;
      el.addEventListener("pointerdown", (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        focusOnRegion(region);
      });
      return el;
    }

    function focusOnRegion(region) {
      const node = callouts.nodes.get(region);
      if (!node?.fullPositions) return;
      const fp = node.fullPositions;
      const anchor = new THREE.Vector3(fp[0], fp[1], fp[2]);
      const center = callouts._center;

      camFocus.fromPos.copy(camera.position);
      camFocus.fromTarget.copy(controls.target);
      camFocus.toTarget.copy(anchor);

      const viewDir = camera.position.clone().sub(controls.target).normalize();
      callouts._dir.copy(anchor).sub(center);
      if (callouts._dir.lengthSq() < 1e-6) callouts._dir.copy(viewDir);
      else callouts._dir.normalize();
      // 外側から部位を見る位置へ
      callouts._dir.lerp(viewDir, 0.35).normalize();
      const dist = Math.max(
        callouts.radius * 2.35,
        camera.position.distanceTo(controls.target) * 0.52,
        1.8
      );
      camFocus.toPos.copy(anchor).addScaledVector(callouts._dir, dist);
      camFocus.t0 = performance.now();
      camFocus.active = true;
      camView.lerping = false;

      callouts.focusRegion = region;
      for (const [r, n] of callouts.nodes) {
        n.el.classList.toggle("focused", r === region);
      }
    }

    function updateCamFocus(now) {
      if (!camFocus.active) return;
      const u = Math.min(1, (now - camFocus.t0) / 1000 / camFocus.duration);
      const e = 1 - Math.pow(1 - u, 3);
      camera.position.lerpVectors(camFocus.fromPos, camFocus.toPos, e);
      controls.target.lerpVectors(camFocus.fromTarget, camFocus.toTarget, e);
      controls.update();
      if (u >= 1) {
        camFocus.active = false;
      }
    }

    function buildCalloutRig() {
      clearCalloutRig();
      if (!modelRoot) return;
      // 配置時の姿勢でワールド固定（以後モデルの呼吸回転には追従しない）
      const savedYaw = modelRoot.rotation.y;
      modelRoot.rotation.y = 0;
      modelRoot.updateMatrixWorld(true);

      const anchors = rebuildRegionAnchors();
      modelRoot.rotation.y = savedYaw;
      modelRoot.updateMatrixWorld(true);
      if (!anchors.size) return;

      callouts.root = new THREE.Group();
      callouts.root.name = "CalloutRig";
      scene.add(callouts.root);

      const center = callouts._center;
      const R = Math.max(callouts.radius, 0.35);

      for (const region of REGION_KEYS) {
        const anchor = anchors.get(region);
        if (!anchor) continue;

        // 線は「部位表面の点」から外側へ伸ばす（中心起点にしない）
        callouts._dir.copy(anchor).sub(center);
        if (callouts._dir.lengthSq() < 1e-5) {
          callouts._dir.copy(REGION_BIAS[region] || REGION_BIAS.other).normalize();
        } else {
          callouts._dir.normalize();
          const bias = REGION_BIAS[region];
          if (bias) callouts._dir.addScaledVector(bias, 0.55).normalize();
        }

        const gap = Math.max(R * ((REGION_PUSH[region] || 2.3) - 1.0), R * 0.85);
        callouts._label.copy(anchor).addScaledVector(callouts._dir, gap);
        callouts._mid.set(
          THREE.MathUtils.lerp(anchor.x, callouts._label.x, 0.45),
          THREE.MathUtils.lerp(anchor.y, callouts._label.y, 0.15),
          THREE.MathUtils.lerp(anchor.z, callouts._label.z, 0.45)
        );

        const lore = loreFor(region);
        const color = new THREE.Color(lore.color);

        const positions = new Float32Array([
          anchor.x, anchor.y, anchor.z,
          callouts._mid.x, callouts._mid.y, callouts._mid.z,
          callouts._label.x, callouts._label.y, callouts._label.z,
        ]);
        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(positions.slice(), 3));

        const lineMat = new THREE.LineBasicMaterial({
          color,
          transparent: true,
          opacity: 0.0,
          depthTest: false,
          depthWrite: false,
        });
        const line = new THREE.Line(geo, lineMat);
        line.renderOrder = 20;
        callouts.root.add(line);

        const glowGeo = new THREE.BufferGeometry();
        glowGeo.setAttribute("position", new THREE.BufferAttribute(positions.slice(), 3));
        const glowMat = new THREE.LineBasicMaterial({
          color,
          transparent: true,
          opacity: 0.0,
          depthTest: false,
          depthWrite: false,
        });
        const glow = new THREE.Line(glowGeo, glowMat);
        glow.renderOrder = 19;
        callouts.root.add(glow);

        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(R * 0.028, 12, 12),
          new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity: 0,
            depthTest: false,
          })
        );
        dot.position.copy(anchor);
        dot.renderOrder = 21;
        callouts.root.add(dot);

        const el = makeCalloutElement(region);
        const labelObj = new CSS2DObject(el);
        labelObj.position.copy(callouts._label);
        callouts.root.add(labelObj);

        callouts.nodes.set(region, {
          line,
          glow,
          dot,
          labelObj,
          el,
          shiftEl: el.querySelector(".callout-shift"),
          fullPositions: positions,
          revealEase: 0,
        });
      }
    }

    function applyCalloutDepth() {
      if (!callouts.locked || !callouts.root) return;
      callouts.root.updateMatrixWorld(true);
      for (const node of callouts.nodes.values()) {
        node.labelObj.getWorldPosition(callouts._world);
        callouts._proj.copy(callouts._world).project(camera);
        const behind = callouts._proj.z > 1;
        node.el.style.visibility = behind ? "hidden" : "visible";
        if (behind) continue;

        const dist = camera.position.distanceTo(callouts._world);
        // 近い=大きく濃く / 遠い=小さく薄くボケる
        const t = THREE.MathUtils.clamp((dist - 2.4) / 7.5, 0, 1);
        const scale = THREE.MathUtils.lerp(1.22, 0.38, t);
        const opacity = THREE.MathUtils.lerp(1.0, 0.22, t) * (node.revealEase ?? 1);
        const blur = THREE.MathUtils.lerp(0, 2.2, t * t);
        if (node.shiftEl) {
          node.shiftEl.style.setProperty("--depth-scale", scale.toFixed(3));
          node.shiftEl.style.setProperty("--depth-opacity", opacity.toFixed(3));
          node.shiftEl.style.setProperty("--depth-blur", `${blur.toFixed(2)}px`);
        }
        if (callouts.settled) {
          const lineA = THREE.MathUtils.lerp(0.92, 0.25, t);
          node.line.material.opacity = lineA;
          node.glow.material.opacity = lineA * 0.28;
          node.dot.material.opacity = THREE.MathUtils.lerp(0.95, 0.2, t);
        }
      }
    }

    function setCalloutsLocked(on) {
      const next = !!on;
      if (next === callouts.locked) return;
      callouts.locked = next;
      callouts.settled = false;
      callouts.focusRegion = null;
      camFocus.active = false;
      if (!next) {
        clearCalloutRig();
        return;
      }
      buildCalloutRig();
      callouts.revealT0 = performance.now();
    }

    function updateCalloutOverlay(now = performance.now()) {
      if (!callouts.locked || !callouts.root) return;
      if (anim.active || anim.progress < 0.99) return;

      if (!callouts.settled) {
        const elapsed = (now - callouts.revealT0) / 1000;
        let i = 0;
        let allDone = true;
        for (const region of REGION_KEYS) {
          const node = callouts.nodes.get(region);
          if (!node) continue;
          const localT = THREE.MathUtils.clamp((elapsed - i * 0.08) / 0.75, 0, 1);
          const ease = 1 - Math.pow(1 - localT, 3);
          node.revealEase = ease;
          if (ease < 1) allDone = false;

          const fp = node.fullPositions;
          const ax = fp[0], ay = fp[1], az = fp[2];
          const mx = fp[3], my = fp[4], mz = fp[5];
          const lx = fp[6], ly = fp[7], lz = fp[8];
          const pos = node.line.geometry.attributes.position.array;
          if (ease < 0.5) {
            const u = ease / 0.5;
            pos[0] = ax; pos[1] = ay; pos[2] = az;
            pos[3] = THREE.MathUtils.lerp(ax, mx, u);
            pos[4] = THREE.MathUtils.lerp(ay, my, u);
            pos[5] = THREE.MathUtils.lerp(az, mz, u);
            pos[6] = pos[3]; pos[7] = pos[4]; pos[8] = pos[5];
          } else {
            const u = (ease - 0.5) / 0.5;
            pos[0] = ax; pos[1] = ay; pos[2] = az;
            pos[3] = mx; pos[4] = my; pos[5] = mz;
            pos[6] = THREE.MathUtils.lerp(mx, lx, u);
            pos[7] = THREE.MathUtils.lerp(my, ly, u);
            pos[8] = THREE.MathUtils.lerp(mz, lz, u);
          }
          node.line.geometry.attributes.position.needsUpdate = true;
          node.glow.geometry.attributes.position.array.set(pos);
          node.glow.geometry.attributes.position.needsUpdate = true;

          node.line.material.opacity = 0.9 * ease;
          node.glow.material.opacity = 0.25 * ease;
          node.dot.material.opacity = 0.95 * ease;
          node.dot.scale.setScalar(0.55 + 0.45 * ease);

          if (ease > 0.5) node.el.classList.add("visible");
          else node.el.classList.remove("visible");

          node.labelObj.position.set(pos[6], pos[7], pos[8]);
          i += 1;
        }

        if (allDone) {
          for (const node of callouts.nodes.values()) {
            const fp = node.fullPositions;
            const pos = node.line.geometry.attributes.position.array;
            pos.set(fp);
            node.line.geometry.attributes.position.needsUpdate = true;
            node.glow.geometry.attributes.position.array.set(fp);
            node.glow.geometry.attributes.position.needsUpdate = true;
            node.revealEase = 1;
            node.labelObj.position.set(fp[6], fp[7], fp[8]);
            node.el.classList.add("visible");
          }
          callouts.settled = true;
        }
      }

      applyCalloutDepth();
    }

    const PALETTE_PRESETS = {
