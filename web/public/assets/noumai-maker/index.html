    let activePalette = { ...PALETTE_PRESETS.mono };
    /** @type {"flight" | "neon"} 合体中=控え目 / 完成後=ネオン */
    let brainLookMode = "flight";

    /** 領域ごとの濃ゆさ 0=ほぼ透明 / 1=不透明寄り（現行の透け感を既定に） */
    const REGION_DENSITY_DEFAULTS = {
      cortex: 0.28,
      limbic: 0.35,
      basal: 0.33,
      thalamus: 0.45,
      cerebellum: 0.21,
      brainstem: 0.61,
      ventricle: 0.37,
      white: 0.55,
      other: 0.39,
    };
    let regionDensity = { ...REGION_DENSITY_DEFAULTS };
    /** @type {Record<string, {face:number,rim:number,faceEmit:number,rimEmit:number,pow:number,depthWrite:boolean}>} */
    const regionShellOverride = {};

    function densityToShell(dens, region) {
      const d = THREE.MathUtils.clamp(dens, 0, 1);
      // 大脳は面積が広いので、同じ dens でも面を薄く・発光を抑える
      const cortexSoft = region === "cortex" ? 0.72 : 1;
      const face = THREE.MathUtils.lerp(0.06, 0.97, d) * cortexSoft;
      const rim = Math.min(0.995, face + THREE.MathUtils.lerp(0.04, 0.18, d));
      const faceEmit = THREE.MathUtils.lerp(0.04, 0.85, d) * (region === "cortex" ? 0.45 : 1);
      const rimEmit = THREE.MathUtils.lerp(0.08, 0.9, d) * (region === "cortex" ? 0.55 : 1);
      return {
        face: THREE.MathUtils.clamp(face, 0.05, 0.95),
        rim: THREE.MathUtils.clamp(rim, 0.08, 0.99),
        faceEmit,
        rimEmit,
        pow: THREE.MathUtils.lerp(1.6, 2.8, d),
        depthWrite:
          region === "cortex" || region === "ventricle" || region === "white"
            ? false
            : d > 0.45,
      };
    }

    function syncDensityIntoShellDebug(region, dens) {
      const look = densityToShell(dens, region);
      if (region === "cortex") {
        cortexAlphaDebug.face = look.face;
        cortexAlphaDebug.rim = look.rim;
        cortexAlphaDebug.pow = look.pow;
        cortexAlphaDebug.faceEmit = look.faceEmit;
        cortexAlphaDebug.rimEmit = look.rimEmit;
        // 中身が見えるよう transmission は少し残す
        cortexAlphaDebug.transmission = THREE.MathUtils.lerp(0.42, 0.12, dens);
        cortexAlphaDebug.thickness = THREE.MathUtils.lerp(0.1, 0.035, dens);
      } else if (region === "white") {
        whiteAlphaDebug.face = look.face;
        whiteAlphaDebug.rim = look.rim;
        whiteAlphaDebug.pow = look.pow;
        whiteAlphaDebug.faceEmit = look.faceEmit;
        whiteAlphaDebug.rimEmit = look.rimEmit;
        whiteAlphaDebug.transmission = THREE.MathUtils.lerp(0.45, 0.04, dens);
        whiteAlphaDebug.thickness = THREE.MathUtils.lerp(0.1, 0.02, dens);
      } else {
        regionShellOverride[region] = look;
      }
    }

    function setRegionDensity(region, dens, { apply = true } = {}) {
      regionDensity[region] = THREE.MathUtils.clamp(dens, 0, 1);
      syncDensityIntoShellDebug(region, regionDensity[region]);
      if (apply) {
        applyShellAlphaDebug();
        applyBrainPalette(activePalette);
        syncShellAlphaUI();
      }
    }

    function randomHexColor() {
      const h = Math.random();
      const s = 0.4 + Math.random() * 0.55;
      const l = 0.42 + Math.random() * 0.38;
      return `#${new THREE.Color().setHSL(h, s, l).getHexString()}`;
    }

    function randomizeBrainLook() {
      for (const key of REGION_KEYS) {
        activePalette[key] = randomHexColor();
        const base = REGION_DENSITY_DEFAULTS[key] ?? 0.4;
        const dens = THREE.MathUtils.clamp(base + (Math.random() - 0.5) * 0.16, 0.15, 0.7);
        setRegionDensity(key, dens, { apply: false });
      }
      applyShellAlphaDebug();
      applyBrainPalette(activePalette);
      if (palettePresetEl) palettePresetEl.value = "custom";
      buildPaletteUI();
    }

    const CORTEX_ALPHA_DEFAULTS = {
      ...densityToShell(REGION_DENSITY_DEFAULTS.cortex, "cortex"),
      transmission: THREE.MathUtils.lerp(0.42, 0.12, REGION_DENSITY_DEFAULTS.cortex),
      thickness: THREE.MathUtils.lerp(0.1, 0.035, REGION_DENSITY_DEFAULTS.cortex),
      alphaViz: false,
    };
    const cortexAlphaDebug = { ...CORTEX_ALPHA_DEFAULTS };

    const WHITE_ALPHA_DEFAULTS = {
      ...densityToShell(REGION_DENSITY_DEFAULTS.white, "white"),
      transmission: THREE.MathUtils.lerp(0.45, 0.04, REGION_DENSITY_DEFAULTS.white),
      thickness: THREE.MathUtils.lerp(0.1, 0.02, REGION_DENSITY_DEFAULTS.white),
      visible: true,
    };
    const whiteAlphaDebug = { ...WHITE_ALPHA_DEFAULTS };

    // 他領域のシェルも同じ透け帯で初期化
    for (const key of REGION_KEYS) {
      if (key === "cortex" || key === "white") continue;
      syncDensityIntoShellDebug(key, REGION_DENSITY_DEFAULTS[key]);
    }

    function isShellAlphaRegion(region) {
      return region === "cortex" || region === "white";
    }

    function classifyRegion(name) {
      const n = (name || "").toLowerCase().replace(/^allen_/, "");
      if (
        n.includes("ventric") ||
        n.includes("csf") ||
        n.includes("choroid")
      )
        return "ventricle";
      if (
        n.includes("cerebell") ||
        n.includes("vermis") ||
        n.includes("floccul")
      )
        return "cerebellum";
      if (
        n.includes("brainstem") ||
        n.includes("pons") ||
        n.includes("medulla") ||
        n.includes("midbrain") ||
        n.includes("mesenceph") ||
        n.includes("olivary") ||
        n.includes("pyramid")
      )
        return "brainstem";
      if (
        n.includes("thalam") ||
        n.includes("hypothal") ||
        n.includes("geniculate") ||
        n.includes("pulvinar")
      )
        return "thalamus";
      if (
        n.includes("hippocamp") ||
        n.includes("amygdal") ||
        n.includes("cingulat") ||
        n.includes("entorhinal") ||
        n.includes("parahippocamp") ||
        n.includes("fornix") ||
        n.includes("mammill") ||
        n.includes("septal") ||
        n.includes("insula")
      )
        return "limbic";
      if (
        n.includes("caudate") ||
        n.includes("putamen") ||
        n.includes("pallidum") ||
        n.includes("striatum") ||
        n.includes("accumbens") ||
        n.includes("substantia") ||
        n.includes("nigra") ||
        n.includes("basal")
      )
        return "basal";
      if (
        n.includes("white") ||
        n.includes("corpus_callosum") ||
        n.includes("callosum") ||
        n.includes("capsule") ||
        n.includes("fascicul") ||
        n.includes("commissure")
      )
        return "white";
      if (
        n.includes("cortex") ||
        n.includes("gyrus") ||
        n.includes("sulcus") ||
        n.includes("frontal") ||
        n.includes("parietal") ||
        n.includes("temporal") ||
        n.includes("occipital") ||
        n.includes("precentral") ||
        n.includes("postcentral") ||
        n.includes("pole")
      )
        return "cortex";
      return "other";
    }

    function hexToThreeColor(hex) {
      return new THREE.Color(hex);
    }

    // 透過は残すが濃く（大脳・白質以外）。cortex/white は各 AlphaDebug が正
    const REGION_SHELL = {
      cortex:     { face: 0.72, rim: 0.94, faceEmit: 0.18, rimEmit: 0.28, pow: 2.2,  depthWrite: true },
      cerebellum: { face: 0.88, rim: 0.95, faceEmit: 0.28, rimEmit: 0.4,  pow: 2.4,  depthWrite: true },
      white:      { face: 0.18, rim: 0.42, faceEmit: 0.08, rimEmit: 0.12, pow: 2.0,  depthWrite: false },
      limbic:     { face: 0.88, rim: 0.95, faceEmit: 0.32, rimEmit: 0.4,  pow: 2.4,  depthWrite: true },
      ventricle:  { face: 0.78, rim: 0.9,  faceEmit: 0.22, rimEmit: 0.35, pow: 2.35, depthWrite: false },
      basal:      { face: 0.9,  rim: 0.96, faceEmit: 0.35, rimEmit: 0.35, pow: 2.5,  depthWrite: true },
      thalamus:   { face: 0.9,  rim: 0.96, faceEmit: 0.38, rimEmit: 0.32, pow: 2.5,  depthWrite: true },
      brainstem:  { face: 0.9,  rim: 0.96, faceEmit: 0.4,  rimEmit: 0.3,  pow: 2.5,  depthWrite: true },
      other:      { face: 0.86, rim: 0.94, faceEmit: 0.28, rimEmit: 0.38, pow: 2.4,  depthWrite: true },
    };

    function cortexShellLook() {
      return {
        face: cortexAlphaDebug.face,
        rim: cortexAlphaDebug.rim,
        faceEmit: cortexAlphaDebug.faceEmit,
        rimEmit: cortexAlphaDebug.rimEmit,
        pow: cortexAlphaDebug.pow,
        depthWrite: false,
      };
    }

    function whiteShellLook() {
      return {
        face: whiteAlphaDebug.face,
        rim: whiteAlphaDebug.rim,
        faceEmit: whiteAlphaDebug.faceEmit,
        rimEmit: whiteAlphaDebug.rimEmit,
        pow: whiteAlphaDebug.pow,
        depthWrite: false,
      };
    }

    function shellLookForAlphaRegion(region) {
      if (region === "white") return whiteShellLook();
      return cortexShellLook();
    }

    function softenHologramTransmission(mat, look) {
      if (!mat) return;
      const physical = !!mat.isMeshPhysicalMaterial;
      const hasT = physical || mat.transmission !== undefined;
      if (!hasT) return;

      if (mat.userData.sourceTransmission === undefined) {
        mat.userData.sourceTransmission = Number(mat.transmission) || 0;
      }
      if (mat.userData.sourceThickness === undefined && mat.thickness !== undefined) {
        mat.userData.sourceThickness = Number(mat.thickness) || 0;
      }

      const region = mat.userData.shellAlphaRegion;
      if (region === "cortex") {
        mat.transmission = cortexAlphaDebug.transmission;
        if (mat.thickness !== undefined) mat.thickness = cortexAlphaDebug.thickness;
      } else if (region === "white") {
        mat.transmission = whiteAlphaDebug.transmission;
        if (mat.thickness !== undefined) mat.thickness = whiteAlphaDebug.thickness;
      } else {
        const face = look?.face ?? 0.9;
        const dens = THREE.MathUtils.clamp((face - 0.85) / 0.13, 0, 1);
        mat.transmission = THREE.MathUtils.lerp(0.08, 0.025, dens);
        if (mat.thickness !== undefined) {
          mat.thickness = THREE.MathUtils.lerp(0.08, 0.03, dens);
        }
      }
      if (mat.attenuationDistance !== undefined) {
        mat.attenuationDistance = 5;
      }
      if (mat.ior !== undefined) {
        mat.ior = 1.2;
      }
      if (mat.alphaMap) mat.alphaMap = null;
      mat.transparent = true;
      mat.needsUpdate = true;
    }

    function applyShellUniforms(mat, look) {
      if (!mat) return;
      mat.transparent = true;
      mat.depthWrite = !!look.depthWrite;
      mat.opacity = look.face;
      softenHologramTransmission(mat, look);
      const su = mat.userData.shellUniforms;
      if (su) {
        su.uShellFace.value = look.face;
        su.uShellRim.value = look.rim;
        su.uShellRimPow.value = look.pow;
        su.uShellFaceEmit.value = look.faceEmit;
        su.uShellRimEmit.value = look.rimEmit;
        if (su.uCortexAlphaViz) {
          su.uCortexAlphaViz.value =
            isShellAlphaRegion(mat.userData.shellAlphaRegion) && cortexAlphaDebug.alphaViz
              ? 1
              : 0;
        }
      } else {
        mat.userData.pendingShell = { ...look };
      }
    }

    function shellLookForPart(region, outerness, sizeNorm) {
      if (isShellAlphaRegion(region)) return shellLookForAlphaRegion(region);
      if (regionShellOverride[region]) return { ...regionShellOverride[region] };
      const dens = regionDensity[region] ?? 0.7;
      const fromDens = densityToShell(dens, region);
      const outer = THREE.MathUtils.clamp(outerness, 0, 1);
      const bulky = THREE.MathUtils.clamp(sizeNorm, 0, 1);
      const thin = outer * 0.08 + bulky * 0.05;
      return {
        ...fromDens,
        face: THREE.MathUtils.clamp(fromDens.face * (1 - thin * 0.05), 0.06, 0.98),
        rim: Math.min(0.995, fromDens.rim),
      };
    }

    function applyShellAlphaDebug() {
      for (const part of parts) {
        const region = part.region || classifyRegion(part.mesh?.name);
        if (!isShellAlphaRegion(region)) continue;
        if (part.mesh) {
          part.mesh.visible = region !== "white" || whiteAlphaDebug.visible;
        }
        const look = shellLookForAlphaRegion(region);
        const mats = Array.isArray(part.mesh.material)
          ? part.mesh.material
          : [part.mesh.material];
        for (const mat of mats) {
          if (!mat) continue;
          mat.userData.shellAlphaRegion = region;
          mat.userData.isCortex = region === "cortex";
          mat.userData.shellLookBase = { ...look };
          applyShellUniforms(mat, look);
          mat.needsUpdate = true;
        }
      }
      syncShellAlphaUI();
    }

    function applyCortexAlphaDebug() {
      applyShellAlphaDebug();
    }

    function syncShellAlphaUI() {
      const map = [
        ["cx-face", "cx-face-val", cortexAlphaDebug.face, 2],
        ["cx-rim", "cx-rim-val", cortexAlphaDebug.rim, 2],
        ["cx-pow", "cx-pow-val", cortexAlphaDebug.pow, 2],
        ["cx-trans", "cx-trans-val", cortexAlphaDebug.transmission, 2],
        ["cx-thick", "cx-thick-val", cortexAlphaDebug.thickness, 3],
        ["cx-face-emit", "cx-face-emit-val", cortexAlphaDebug.faceEmit, 2],
        ["cx-rim-emit", "cx-rim-emit-val", cortexAlphaDebug.rimEmit, 2],
        ["wm-face", "wm-face-val", whiteAlphaDebug.face, 2],
        ["wm-rim", "wm-rim-val", whiteAlphaDebug.rim, 2],
        ["wm-trans", "wm-trans-val", whiteAlphaDebug.transmission, 2],
      ];
      for (const [id, vid, v, digits] of map) {
        const el = document.getElementById(id);
        const vel = document.getElementById(vid);
        if (el) el.value = String(v);
        if (vel) vel.textContent = Number(v).toFixed(digits);
      }
      const viz = document.getElementById("cx-alpha-viz");
      if (viz) viz.checked = !!cortexAlphaDebug.alphaViz;
      const wmVis = document.getElementById("wm-visible");
      if (wmVis) wmVis.checked = !!whiteAlphaDebug.visible;
    }

    function syncCortexAlphaUI() {
      syncShellAlphaUI();
    }

    function applyBrainPalette(palette) {
      if (palette) activePalette = { ...palette };
      const neon = brainLookMode === "neon";
      const colorMinimal = palettePresetEl?.value === "mono";
      const freeColor = !colorMinimal;
      for (const part of parts) {
        const region = part.region || classifyRegion(part.mesh?.name);
        const shellAlpha = isShellAlphaRegion(region);
        const hex = activePalette[region] || activePalette.other;
        _paletteCol.set(hex);
        if (colorMinimal) {
          _paletteCol.lerp(_paletteMix, 0.55);
          _paletteCol.multiplyScalar(0.55);
        } else if (!neon && !freeColor) {
          _paletteCol.lerp(_paletteMix, 0.35);
          _paletteCol.multiplyScalar(0.8);
        }
        if (part.mesh && region === "white") {
          part.mesh.visible = whiteAlphaDebug.visible;
        }
        const mats = Array.isArray(part.mesh.material)
          ? part.mesh.material
          : [part.mesh.material];
        for (const mat of mats) {
          if (!mat) continue;
          if (mat.emissive) mat.emissive.copy(_paletteCol);
          if (mat.color) {
            const mul = colorMinimal ? 0.12 : freeColor ? (neon ? 0.4 : 0.28) : neon ? 0.32 : 0.16;
            mat.color.copy(_paletteCol).multiplyScalar(region === "cortex" ? mul * 0.75 : mul);
          }
          if (mat.emissiveIntensity !== undefined) {
            const base = mat.userData.baseEmissive ?? Math.min(mat.emissiveIntensity || 1, 1);
            mat.userData.baseEmissive = base;
            let mul = colorMinimal
              ? neon ? 0.28 : 0.18
              : freeColor
                ? neon ? 0.85 : 0.55
                : neon ? 0.62 : 0.36;
            if (region === "cortex") mul *= 0.55;
            mat.emissiveIntensity = base * mul;
          }
          // 光沢：低ラフネス + クリアコート
          if (mat.roughness !== undefined) {
            mat.roughness = neon ? 0.18 : 0.28;
          }
          if (mat.metalness !== undefined) {
            mat.metalness = neon ? 0.32 : 0.22;
          }
          if (mat.envMapIntensity !== undefined) {
            mat.envMapIntensity = neon ? 1.45 : 1.2;
          }
          if (mat.isMeshPhysicalMaterial) {
            mat.clearcoat = neon ? 0.72 : 0.55;
            mat.clearcoatRoughness = neon ? 0.12 : 0.2;
            if (mat.specularIntensity !== undefined) mat.specularIntensity = 1.15;
          }
          if (shellAlpha) {
            mat.userData.shellAlphaRegion = region;
            mat.userData.isCortex = region === "cortex";
            applyShellUniforms(mat, shellLookForAlphaRegion(region));
          } else {
            const densLook =
              regionShellOverride[region] ||
              densityToShell(regionDensity[region] ?? 0.7, region);
            mat.userData.shellLookBase = { ...densLook };
            applyShellUniforms(mat, densLook);
          }
          // color/intensity のみなら needsUpdate 不要（毎フレ再コンパイル相当のカクつき防止）
        }
      }
      if (electricUniforms?.uBoltColor) {
        const limb = hexToThreeColor(activePalette.limbic || "#8a949c");
        if (colorMinimal) limb.lerp(new THREE.Color(0x334044), 0.4);
        electricUniforms.uBoltColor.value.copy(limb);
        if (electricUniforms.uBoltColorCore) {
          electricUniforms.uBoltColorCore.value
            .copy(limb)
            .lerp(new THREE.Color(0xffffff), 0.55);
        }
      }
      bloom.strength = neon
        ? BLOOM_STRENGTH
        : BLOOM_STRENGTH * (colorMinimal ? 0.45 : freeColor ? 0.8 : 0.65);
      bloom.threshold = neon
        ? BLOOM_THRESHOLD
        : Math.min(0.94, BLOOM_THRESHOLD + 0.05);
      renderer.toneMappingExposure = neon ? EXPOSURE : EXPOSURE * 0.92;
    }

    function setBrainLookMode(mode, { force = false } = {}) {
      const next = mode === "neon" ? "neon" : "flight";
      if (!force && brainLookMode === next) return;
      brainLookMode = next;
      applyBrainPalette(activePalette);
    }

    function buildPaletteUI() {
      if (!paletteGridEl) return;
      paletteGridEl.innerHTML = "";
      for (const key of REGION_KEYS) {
        const item = document.createElement("div");
        item.className = "palette-item";
        const label = document.createElement("label");
        label.textContent = key;
        label.htmlFor = `pal-${key}`;
        const input = document.createElement("input");
        input.type = "color";
        input.id = `pal-${key}`;
        input.value = activePalette[key] || "#ffffff";
        input.addEventListener("input", () => {
          activePalette[key] = input.value;
          applyBrainPalette(activePalette);
          if (palettePresetEl) palettePresetEl.value = "custom";
          if (paletteGridEl) paletteGridEl.classList.remove("is-muted");
        });
        const densRow = document.createElement("div");
        densRow.className = "dens-row";
        const dens = document.createElement("input");
        dens.type = "range";
        dens.min = "0";
        dens.max = "1";
        dens.step = "0.01";
        dens.value = String(regionDensity[key] ?? 0.7);
        dens.title = "濃ゆさ（透過）";
        dens.id = `dens-${key}`;
        const densVal = document.createElement("span");
        densVal.className = "val";
        densVal.id = `dens-${key}-val`;
        densVal.textContent = Number(dens.value).toFixed(2);
        dens.addEventListener("input", () => {
          densVal.textContent = Number(dens.value).toFixed(2);
          if (palettePresetEl && palettePresetEl.value === "mono") {
            palettePresetEl.value = "custom";
          }
          if (paletteGridEl) paletteGridEl.classList.remove("is-muted");
          setRegionDensity(key, Number(dens.value));
        });
        densRow.append(dens, densVal);
        item.append(label, input, densRow);
        paletteGridEl.appendChild(item);
      }
    }

    function setPalettePreset(name) {
      if (name === "custom") {
        buildPaletteUI();
        applyBrainPalette(activePalette);
        if (palettePresetEl) palettePresetEl.value = "custom";
        if (paletteGridEl) paletteGridEl.classList.remove("is-muted");
        return;
      }
      const preset = PALETTE_PRESETS[name] || PALETTE_PRESETS.mono;
      activePalette = { ...preset };
      regionDensity = { ...REGION_DENSITY_DEFAULTS };
      for (const key of REGION_KEYS) {
        syncDensityIntoShellDebug(key, regionDensity[key]);
      }
      buildPaletteUI();
      applyShellAlphaDebug();
      applyBrainPalette(activePalette);
      syncShellAlphaUI();
      if (palettePresetEl) palettePresetEl.value = name in PALETTE_PRESETS ? name : "mono";
      if (paletteGridEl) {
        paletteGridEl.classList.toggle("is-muted", false);
      }
    }

    const patchedHeadMats = new Set();
    const headBrainWindow = {
      center: new THREE.Vector3(),
      radius: 1,
    };

    function computeBrainWindow(root) {
      const box = new THREE.Box3();
      let found = false;
      root.updateMatrixWorld(true);
      root.traverse((obj) => {
        if (!isBrainMesh(obj)) return;
        box.expandByObject(obj);
        found = true;
      });
      if (!found) {
        headBrainWindow.center.set(0, 0.05, 0);
        headBrainWindow.radius = 0.55;
        return headBrainWindow;
      }
      box.getCenter(headBrainWindow.center);
      const size = box.getSize(new THREE.Vector3());
      // 脳殻付近は控えめ、顔・首・後頭部側で線を強調
      headBrainWindow.radius = Math.max(size.x, size.y, size.z) * 0.42;
      return headBrainWindow;
    }

    function syncHeadBrainWindow() {
      for (const mat of headMats) {
        const sh = mat.userData.headShader;
        if (!sh?.uniforms?.uBrainCenter) continue;
        sh.uniforms.uBrainCenter.value.copy(headBrainWindow.center);
        sh.uniforms.uBrainRadius.value = headBrainWindow.radius;
      }
    }

    function patchHeadMaterial(mat) {
      if (!mat || patchedHeadMats.has(mat.uuid)) return;
      patchedHeadMats.add(mat.uuid);

      mat.onBeforeCompile = (shader) => {
        shader.uniforms.uBrainCenter = { value: headBrainWindow.center.clone() };
        shader.uniforms.uBrainRadius = { value: headBrainWindow.radius };
        shader.uniforms.uLineBoost = { value: 3.4 };
        shader.uniforms.uFillDim = { value: 0.34 };
        shader.uniforms.uDepthNear = { value: 2.3 };
        shader.uniforms.uDepthFar = { value: 8.2 };
        mat.userData.headShader = shader;

        shader.vertexShader = shader.vertexShader
          .replace(
            "#include <common>",
            `#include <common>
            varying vec3 vHeadWorldPos;
            varying vec3 vHeadWorldNormal;`
          )
          .replace(
            "#include <begin_vertex>",
            `#include <begin_vertex>
            vHeadWorldPos = (modelMatrix * vec4(transformed, 1.0)).xyz;
            vHeadWorldNormal = normalize(mat3(modelMatrix) * objectNormal);`
          );

        shader.fragmentShader = shader.fragmentShader
          .replace(
            "#include <common>",
            `#include <common>
            varying vec3 vHeadWorldPos;
            varying vec3 vHeadWorldNormal;
            uniform vec3 uBrainCenter;
            uniform float uBrainRadius;
            uniform float uLineBoost;
            uniform float uFillDim;
            uniform float uDepthNear;
            uniform float uDepthFar;`
          )
          .replace(
            "#include <emissivemap_fragment>",
            `#include <emissivemap_fragment>
            {
              float dist = length(vHeadWorldPos - uBrainCenter);
              // 脳付近=0 / 外側=1
              float outside = smoothstep(uBrainRadius * 0.75, uBrainRadius * 1.55, dist);
              // テクスチャの明るい画素＝回路線
              float line = max(max(totalEmissiveRadiance.r, totalEmissiveRadiance.g), totalEmissiveRadiance.b);
              #ifdef USE_MAP
                vec3 mapLum = diffuseColor.rgb;
                line = max(line, max(mapLum.r, max(mapLum.g, mapLum.b)));
              #endif
              line = pow(clamp(line * 1.35, 0.0, 1.0), 0.85);

              // カメラ距離で遠近（近い回路を立て、遠い面を沈める）
              float camDist = length(vHeadWorldPos - cameraPosition);
              float depthT = smoothstep(uDepthNear, uDepthFar, camDist);
              float depthEmit = mix(1.4, 0.22, depthT);
              float depthAlpha = mix(1.15, 0.42, depthT);
              float depthCol = mix(1.2, 0.35, depthT);

              vec3 viewDir = normalize(cameraPosition - vHeadWorldPos);
              float ndv = abs(dot(normalize(vHeadWorldNormal), viewDir));
              float fres = pow(clamp(1.0 - ndv, 0.0, 1.0), 2.1);
              // 手前の稜線を強調、奥は弱く
              float rim = fres * mix(1.15, 0.25, depthT);

              // 線: 脳の外で強く / 塗り: 抑える + 遠近
              float emitMul = mix(uFillDim, uLineBoost, line);
              emitMul *= mix(0.55, 1.35, outside);
              emitMul *= depthEmit;
              // 顎〜首下を持ち上げる（下側のさびしさ対策）
              float lower = smoothstep(0.05, -0.75, vHeadWorldPos.y);
              emitMul *= mix(1.0, 1.55, lower);
              totalEmissiveRadiance *= emitMul;
              totalEmissiveRadiance += totalEmissiveRadiance * rim * mix(0.35, 1.1, line);

              diffuseColor.a *= mix(0.55, mix(0.7, 1.15, outside), line) * depthAlpha;
              diffuseColor.rgb *= mix(0.25, mix(0.55, 1.0, outside), line) * depthCol;
              diffuseColor.rgb *= mix(1.0, 0.7, depthT * (1.0 - line));
              diffuseColor.rgb *= mix(1.0, 1.35, lower * (0.45 + line * 0.55));
              diffuseColor.a = min(1.0, diffuseColor.a * mix(1.0, 1.2, lower));
            }`
          );
      };
      mat.needsUpdate = true;
    }

    function setupHead(root) {
      headMesh = null;
      headMats.length = 0;
      headGlowOn = false;
      computeBrainWindow(root);
      root.traverse((obj) => {
        if (!isHeadMesh(obj)) return;
        if (!headMesh) headMesh = obj;
        obj.castShadow = false;
        obj.receiveShadow = false;
        obj.renderOrder = -5; // 脳より先に描画
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        for (const mat of mats) {
          if (!mat) continue;
          mat.side = THREE.DoubleSide;
          mat.transparent = true;
          mat.depthWrite = false;
          // 頭部シェルは GLB で transmission≈0.92 — 先に薄める
          softenHologramTransmission(mat, { face: 0.7 });
          if (mat.opacity !== undefined) {
            mat.userData.headBaseOpacity = Math.min(mat.opacity ?? 1, 0.42);
            mat.opacity = mat.userData.headBaseOpacity;
          }
          const baseEm =
            mat.emissiveIntensity !== undefined
              ? Math.min(mat.emissiveIntensity || 1, 3.2)
              : 1.4;
          mat.userData.headBaseEmissive = Math.max(baseEm * 0.95, 1.15);
          mat.userData.headGlowEmissive = Math.min(baseEm * 1.85, 3.6);
          mat.emissiveIntensity = mat.userData.headBaseEmissive;
          if (mat.color) mat.color.setRGB(0.01, 0.08, 0.04);
          if (mat.emissive) mat.emissive.setRGB(0.32, 1.0, 0.48);
          patchHeadMaterial(mat);
          headMats.push(mat);
          mat.needsUpdate = true;
        }
      });
      applyHeadGlow(false);
      syncHeadBrainWindow();
      return headMesh;
    }

    function applyHeadGlow(on) {
      headGlowOn = !!on;
      for (const mat of headMats) {
        const base = mat.userData.headBaseEmissive ?? 1.15;
        const glow = mat.userData.headGlowEmissive ?? base * 1.6;
        mat.emissiveIntensity = headGlowOn ? glow : base;
        if (mat.opacity !== undefined) {
          const bo = mat.userData.headBaseOpacity ?? 0.38;
          mat.opacity = headGlowOn ? Math.min(bo * 1.25, 0.5) : bo;
        }
        const sh = mat.userData.headShader;
        if (sh?.uniforms?.uLineBoost) {
          sh.uniforms.uLineBoost.value = headGlowOn ? 4.6 : 3.4;
        }
      }
      if (btnHeadGlow) {
        btnHeadGlow.textContent = headGlowOn ? "Head Glow ON" : "Head Glow OFF";
        btnHeadGlow.classList.toggle("primary", headGlowOn);
      }
    }

    function collectSurfaceSamples(root, maxSamples = 7000) {
      const samples = [];
      const v = new THREE.Vector3();
      root.updateMatrixWorld(true);
      root.traverse((obj) => {
        if (!isBrainMesh(obj) || !obj.geometry?.attributes?.position) return;
        const pos = obj.geometry.attributes.position;
        const step = Math.max(1, Math.floor(pos.count / 60));
        for (let i = 0; i < pos.count; i += step) {
          v.fromBufferAttribute(pos, i).applyMatrix4(obj.matrixWorld);
          root.worldToLocal(v);
          samples.push(v.clone());
        }
      });
      if (samples.length <= maxSamples) return samples;
      const out = [];
      const stride = samples.length / maxSamples;
      for (let i = 0; i < maxSamples; i++) out.push(samples[Math.floor(i * stride)]);
      return out;
    }

    function buildLightningPath(samples) {
      if (samples.length < 20) return null;
      const used = new Set();
      let idx = Math.floor(Math.random() * samples.length);
      const path = [samples[idx].clone()];
      used.add(idx);
      _ldir
        .set(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5)
        .normalize();

      const steps = 6 + Math.floor(Math.random() * 12); // 短めの稲妻
      const minD = 0.018;
      const maxD = 0.06 + Math.random() * 0.05;

      for (let s = 0; s < steps; s++) {
        const cur = path[path.length - 1];
        const candidates = [];
        for (let i = 0; i < samples.length; i++) {
          if (used.has(i)) continue;
          const d = cur.distanceTo(samples[i]);
          if (d < minD || d > maxD) continue;
          _lto.subVectors(samples[i], cur).normalize();
          const align = _lto.dot(_ldir);
          // しわ沿いっぽく、大きく折り返しすぎない
          if (align < -0.15 && s > 3) continue;
          candidates.push({ i, score: align * 0.55 + Math.random() });
        }
        if (!candidates.length) {
          // 探索半径を広げて再試行
          for (let i = 0; i < samples.length; i++) {
            if (used.has(i)) continue;
            const d = cur.distanceTo(samples[i]);
            if (d < minD || d > maxD * 1.8) continue;
            candidates.push({ i, score: Math.random() });
          }
        }
        if (!candidates.length) break;

        candidates.sort((a, b) => b.score - a.score);
        const pick = candidates[Math.floor(Math.random() * Math.min(6, candidates.length))];
        const next = samples[pick.i];

        // 稲妻のギザギザ中点
        const mid = cur.clone().lerp(next, 0.45 + Math.random() * 0.2);
        mid.add(
          _ltmp
            .set(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5)
            .multiplyScalar(0.012 + Math.random() * 0.02)
        );
        path.push(mid);
        path.push(next.clone());
        _ldir.subVectors(next, cur).normalize();
        used.add(pick.i);
      }

      return path.length >= 4 ? path : null;
    }

    function packBoltPath(path) {
      if (path.length <= MAX_BOLT_POINTS) return path.map((p) => p.clone());
      const out = [];
      for (let i = 0; i < MAX_BOLT_POINTS; i++) {
        const t = i / (MAX_BOLT_POINTS - 1);
        const idx = t * (path.length - 1);
        const i0 = Math.floor(idx);
        const i1 = Math.min(path.length - 1, i0 + 1);
        out.push(path[i0].clone().lerp(path[i1], idx - i0));
      }
      return out;
    }

    function clearLightningBolts() {
      lightning.active = null;
      electricUniforms.uBoltCount.value = 0;
      electricUniforms.uBoltIntensity.value = 0;
      if (!combineFlash.active) bloom.strength = BLOOM_STRENGTH;
    }

    function pushBoltToUniforms(pathLocal, intensity) {
      if (!modelRoot || !pathLocal?.length) {
        clearLightningBolts();
        return;
      }
      modelRoot.updateMatrixWorld(true);
      const n = Math.min(pathLocal.length, MAX_BOLT_POINTS);
      for (let i = 0; i < MAX_BOLT_POINTS; i++) {
        if (i < n) {
          _boltWorld.copy(pathLocal[i]).applyMatrix4(modelRoot.matrixWorld);
          electricUniforms.uBoltPoints.value[i].copy(_boltWorld);
        } else {
          electricUniforms.uBoltPoints.value[i].set(0, 0, 0);
        }
      }
      electricUniforms.uBoltCount.value = n;
      electricUniforms.uBoltIntensity.value = intensity;
    }

    function spawnLightningBolt() {
      if (lightning.samples.length < 20) return;
      const path = buildLightningPath(lightning.samples);
      if (!path) return;
      lightning.active = {
        pathLocal: packBoltPath(path),
        birth: performance.now(),
        life: 900 + Math.random() * 1100,
        peak: 0.22 + Math.random() * 0.18,
      };
      pushBoltToUniforms(lightning.active.pathLocal, 0.01);
    }

    function initLightning(root) {
      clearLightningBolts();
      if (!lightning.samples.length && root) {
        lightning.samples = collectSurfaceSamples(root);
      }
      lightning.nextSpawnAt = performance.now() + 2500;
    }

    function isLightningActive() {
      return !anim.active && anim.timeline >= 0.99 && anim.progress >= 0.95;
    }

    function updateLightning(now) {
      if (!isLightningActive()) {
        if (lightning.active) clearLightningBolts();
        return;
      }

      if (!lightning.active && now >= lightning.nextSpawnAt) {
        spawnLightningBolt();
        lightning.nextSpawnAt = now + 4000 + Math.random() * 4000;
      }

      if (!lightning.active) {
        electricUniforms.uBoltIntensity.value = 0;
        return;
      }

      const b = lightning.active;
      const t = (now - b.birth) / b.life;
      if (t >= 1) {
        clearLightningBolts();
        return;
      }
      let envelope = t < b.peak ? t / b.peak : 1 - (t - b.peak) / Math.max(1 - b.peak, 0.001);
      envelope = Math.max(0, envelope);
      const soft = 0.92 + 0.08 * Math.sin((now - b.birth) * 0.008);
      const intensity = envelope * soft;
      pushBoltToUniforms(b.pathLocal, intensity);
      // 全体ブルームは動かさない（定期暗転の原因になる）
    }

    function patchElectricMaterial(mat) {
      if (!mat || patchedElectricMats.has(mat.uuid)) return;
      patchedElectricMats.add(mat.uuid);

      mat.onBeforeCompile = (shader) => {
        Object.assign(shader.uniforms, electricUniforms);
        const pending = isShellAlphaRegion(mat.userData.shellAlphaRegion)
          ? shellLookForAlphaRegion(mat.userData.shellAlphaRegion)
          : mat.userData.pendingShell || {
              face: 0.86, rim: 0.94, faceEmit: 0.28, rimEmit: 0.38, pow: 2.35,
            };
        shader.uniforms.uShellFace = { value: pending.face };
        shader.uniforms.uShellRim = { value: pending.rim };
        shader.uniforms.uShellRimPow = { value: pending.pow };
        shader.uniforms.uShellFaceEmit = { value: pending.faceEmit };
        shader.uniforms.uShellRimEmit = { value: pending.rimEmit };
        shader.uniforms.uCortexAlphaViz = {
          value:
            isShellAlphaRegion(mat.userData.shellAlphaRegion) && cortexAlphaDebug.alphaViz
              ? 1
              : 0,
        };
        mat.userData.shellUniforms = {
          uShellFace: shader.uniforms.uShellFace,
          uShellRim: shader.uniforms.uShellRim,
          uShellRimPow: shader.uniforms.uShellRimPow,
          uShellFaceEmit: shader.uniforms.uShellFaceEmit,
          uShellRimEmit: shader.uniforms.uShellRimEmit,
          uCortexAlphaViz: shader.uniforms.uCortexAlphaViz,
        };
        mat.userData.electricShader = shader;

        shader.vertexShader = shader.vertexShader
          .replace(
            "#include <common>",
            `#include <common>
            varying vec3 vElectricWorldPos;
            varying vec3 vElectricNormal;`
          )
          .replace(
            "#include <begin_vertex>",
            `#include <begin_vertex>
            vElectricWorldPos = (modelMatrix * vec4(transformed, 1.0)).xyz;
            vElectricNormal = normalize(mat3(modelMatrix) * objectNormal);`
          );

        shader.fragmentShader = shader.fragmentShader
          .replace(
            "#include <common>",
            `#include <common>
            varying vec3 vElectricWorldPos;
            varying vec3 vElectricNormal;
            uniform float uElectric;
            uniform float uElectricTime;
            uniform float uArcProgress;
            uniform float uScanComplete;
            uniform vec3 uElectricColor;
            uniform vec3 uElectricColor2;
            uniform sampler2D uVeinMap;
            uniform int uBoltCount;
            uniform float uBoltIntensity;
            uniform float uBoltWidth;
            uniform vec3 uBoltColor;
            uniform vec3 uBoltColorCore;
            uniform vec3 uBoltPoints[32];
            uniform float uShellFace;
            uniform float uShellRim;
            uniform float uShellRimPow;
            uniform float uShellFaceEmit;
            uniform float uShellRimEmit;
            uniform float uCortexAlphaViz;

            float boltDistToSeg(vec3 p, vec3 a, vec3 b) {
              vec3 ab = b - a;
              float ab2 = dot(ab, ab);
              if (ab2 < 1e-8) return distance(p, a);
              float t = clamp(dot(p - a, ab) / ab2, 0.0, 1.0);
              return length(p - (a + ab * t));
            }

            float shellFresnel() {
              vec3 viewDir = normalize(cameraPosition - vElectricWorldPos);
              float ndv = abs(dot(normalize(vElectricNormal), viewDir));
              return pow(clamp(1.0 - ndv, 0.0, 1.0), uShellRimPow);
            }`
          )
          .replace(
            "#include <alphamap_fragment>",
            `#include <alphamap_fragment>
            {
              float sf = shellFresnel();
              // 大脳透過デバッグ: face/rim α を Fresnel ミックス
              diffuseColor.a = mix(uShellFace, uShellRim, sf);
              if (uCortexAlphaViz > 0.5) {
                diffuseColor.rgb = vec3(diffuseColor.a);
              } else {
                diffuseColor.rgb *= mix(0.88, 1.0, sf);
              }
            }`
          )
          .replace(
            "#include <opacity_fragment>",
            `#include <opacity_fragment>
            {
              float sf = shellFresnel();
              diffuseColor.a = mix(uShellFace, uShellRim, sf);
              if (uCortexAlphaViz > 0.5) {
                diffuseColor.rgb = vec3(diffuseColor.a);
              } else {
                diffuseColor.rgb *= mix(0.88, 1.0, sf);
              }
            }`
          )
          .replace(
            "#include <emissivemap_fragment>",
            `#include <emissivemap_fragment>
            {
              float sf = shellFresnel();
              if (uCortexAlphaViz > 0.5) {
                totalEmissiveRadiance *= 0.04;
              } else {
                totalEmissiveRadiance *= mix(uShellFaceEmit, 1.0, sf);
                totalEmissiveRadiance += totalEmissiveRadiance * sf * uShellRimEmit * 0.4;
              }
            }
            // 合体後稲妻: 元メッシュ表面上の emissive（ホロ材と同じ経路）
            if (uBoltIntensity > 0.001 && uBoltCount > 1) {
              vec3 wp = vElectricWorldPos;
              float glow = 0.0;
              float core = 0.0;
              for (int i = 0; i < 31; i++) {
                if (i >= uBoltCount - 1) break;
                float d = boltDistToSeg(wp, uBoltPoints[i], uBoltPoints[i + 1]);
                glow = max(glow, 1.0 - smoothstep(0.0, uBoltWidth, d));
                core = max(core, 1.0 - smoothstep(0.0, uBoltWidth * 0.38, d));
              }
              glow = pow(glow, 1.35);
              core = pow(core, 1.6);
              totalEmissiveRadiance += uBoltColor * glow * uBoltIntensity * 2.4;
              totalEmissiveRadiance += uBoltColorCore * core * uBoltIntensity * 2.0;
            }
            if (uElectric > 0.001) {
              vec3 wp = vElectricWorldPos;
              vec3 pn = normalize(vElectricNormal);

              // 下→上のスキャンプレーン
              float yMin = -1.15;
              float yMax = 1.2;
              float scanY = mix(yMin - 0.25, yMax + 0.25, clamp(uArcProgress, 0.0, 1.0));
              float dy = wp.y - scanY;

              // シャープなスキャンライン + 後方の帯
              float scanLine = exp(-pow(dy * 22.0, 2.0));
              float scanGlow = exp(-pow(dy * 7.0, 2.0)) * 0.45;
              float scanned = 1.0 - smoothstep(-0.04, 0.12, dy);

              // 回路グリッド（ワールド投影）
              vec2 cuv = wp.xz * 1.35 + vec2(0.0, uElectricTime * 0.35);
              vec2 cuv2 = wp.xy * 1.1 + vec2(uElectricTime * 0.55, 0.0);
              float circuit = texture2D(uVeinMap, cuv).g;
              circuit = max(circuit, texture2D(uVeinMap, cuv2).g * 0.75);
              circuit = pow(clamp(circuit, 0.0, 1.0), 1.1);

              // 細かいデジタル格子
              float gx = abs(fract(wp.x * 14.0) - 0.5);
              float gz = abs(fract(wp.z * 14.0) - 0.5);
              float grid = 1.0 - smoothstep(0.0, 0.04, min(gx, gz));
              grid = pow(grid, 1.5);

              // スキャン済み領域を電流が流れる（進行方向にパルス）
              float flowPulse = 0.55 + 0.45 * sin((wp.y * 10.0 - uElectricTime * 9.0) + wp.x * 3.0);
              float current = circuit * scanned * flowPulse;
              float gridLit = grid * scanned * 0.35;

              // 未スキャン側はほぼ暗い
              float ahead = smoothstep(0.0, 0.2, dy);

              vec3 col = mix(uElectricColor, uElectricColor2, scanLine);
              float beam = (scanLine * 2.8 + scanGlow) * uElectric;
              float body = (current * 2.2 + gridLit) * uElectric * (1.0 - ahead * 0.85);

              // スキャン完了の一括ハイライト
              float complete = uScanComplete * (0.55 + 0.45 * circuit + grid * 0.25);

              // リムでサイバー感
              float fres = pow(1.0 - abs(dot(pn, normalize(vec3(0.15, 0.7, 0.55)))), 2.2);

              totalEmissiveRadiance += col * (beam + body + complete * 3.2);
              totalEmissiveRadiance += uElectricColor2 * fres * scanned * uElectric * 0.55;
            }`
          );
      };

      mat.needsUpdate = true;
    }

    function setStatus(text, state) {
      const label = text || "—";
      if (debugMiniLabel) debugMiniLabel.textContent = label;
      if (dialogStatusLabel) dialogStatusLabel.textContent = label;
      if (stateLabel) stateLabel.textContent = label;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function easeOutQuint(t) {
      return 1 - Math.pow(1 - t, 5);
    }

    function easeInQuint(t) {
      return t * t * t * t * t;
    }

    /** 着地にわずかなオーバーシュート（重み） */
    function easeOutBack(t) {
      const c1 = 1.45;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    /** 接近軌道: 中盤はしっかり進み、着地前で重く減速 */
    function sampleApproach(start, bend, end, t, out, ease = true) {
      const u = ease ? easeInOutCubic(t) : t;
      const omu = 1 - u;
      return out
        .set(0, 0, 0)
        .addScaledVector(start, omu * omu)
        .addScaledVector(bend, 2 * omu * u)
        .addScaledVector(end, u * u);
    }

    function triggerCombineFlash() {
      combineFlash.active = true;
      combineFlash.t0 = performance.now();
      _scanPhase = "scan";
      controls.enableDamping = false;
      controls.enabled = false;
      flashEl.classList.remove("on", "complete");
      flashEl.style.setProperty("--scan-y", "100%");
      if (!flashEl.classList.contains("arc")) flashEl.classList.add("arc");
      electricUniforms.uElectric.value = 0;
      electricUniforms.uArcProgress.value = 0;
      electricUniforms.uScanComplete.value = 0;
      setStatus("SCANNING", "loading");
    }

    function updateCombineFlash(now) {
      if (!combineFlash.active) return false;
      const elapsed = (now - combineFlash.t0) / 1000;
      const t = elapsed / combineFlash.duration;

      if (t >= 1) {
        combineFlash.active = false;
        _scanPhase = "";
        flashEl.classList.remove("on", "arc", "complete");
        bloom.strength = BLOOM_STRENGTH;
        bloom.threshold = BLOOM_THRESHOLD;
        renderer.toneMappingExposure = EXPOSURE;
        electricUniforms.uElectric.value = 0;
        electricUniforms.uArcProgress.value = 0;
        electricUniforms.uScanComplete.value = 0;
        for (const part of parts) {
          const mats = Array.isArray(part.mesh.material) ? part.mesh.material : [part.mesh.material];
          for (const mat of mats) {
            if (mat && mat.emissiveIntensity !== undefined) {
              const base = mat.userData.baseEmissive ?? 1;
              mat.emissiveIntensity = base * 0.75;
            }
          }
        }
        setStatus("Ready", "ok");
        setOrbitControlsEnabled(true);
        setCalloutsLocked(true);
        return false;
      }

      // スキャン線を先に進め、発光は遅れて追従
      const scanSpan = 0.58;
      const scanT = easeOutCubic(Math.min(1, t / scanSpan));
      let e = 0;
      let complete = 0;
      if (t < 0.06) {
        e = 0;
      } else if (t < scanSpan) {
        const glowU = (t - 0.06) / (scanSpan - 0.06);
        e = easeInOutCubic(glowU) * (0.25 + 0.75 * scanT);
      } else if (t < 0.78) {
        e = 1;
      } else {
        e = Math.max(0, 1 - (t - 0.78) / 0.22);
      }

      let phase = "fade";
      if (t >= scanSpan && t < 0.78) {
        phase = "complete";
        complete = Math.max(0, 1 - Math.abs((t - 0.68) / 0.08));
      } else if (t < scanSpan) {
        phase = "scan";
      }

      if (phase !== _scanPhase) {
        _scanPhase = phase;
        if (phase === "complete") {
          flashEl.classList.remove("arc");
          flashEl.classList.add("complete");
          setStatus("SCAN COMPLETE", "ok");
        } else if (phase === "scan") {
          flashEl.classList.add("arc");
          flashEl.classList.remove("complete");
        } else {
          flashEl.classList.remove("arc", "complete");
        }
      }
      if (phase === "scan") {
        flashEl.style.setProperty("--scan-y", `${(1 - scanT) * 100}%`);
      }

      e = Math.max(0, e);
      electricUniforms.uElectric.value = e;
      electricUniforms.uElectricTime.value = elapsed;
      electricUniforms.uArcProgress.value = scanT;
      electricUniforms.uScanComplete.value = complete * e;

      const beamBoost = Math.exp(-Math.pow((scanT - 0.5) * 2.2, 2.0)) * 0.12;
      bloom.strength = BLOOM_STRENGTH + e * (0.32 + complete * 0.85 + beamBoost);
      bloom.threshold = Math.max(0.22, BLOOM_THRESHOLD - e * 0.3 - complete * 0.22);
      renderer.toneMappingExposure = EXPOSURE + e * 0.22 + complete * 0.4;

      for (const part of parts) {
        const mats = Array.isArray(part.mesh.material) ? part.mesh.material : [part.mesh.material];
        for (const mat of mats) {
          if (mat && mat.emissiveIntensity !== undefined) {
            const base = mat.userData.baseEmissive ?? 1;
            mat.emissiveIntensity = base * 0.7 + e * base * 0.5 + complete * base * 1.05;
          }
        }
      }
      return true;
    }

    function frameObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      object.position.sub(center);
      const maxDim = Math.max(size.x, size.y, size.z);
      const fit = maxDim / (2 * Math.tan((Math.PI * camera.fov) / 360));
      camView.radius = fit * 1.7;
      camView.baseRadius = camView.radius;
      camView.target.set(0, size.y * 0.02, 0);
      camView.index = 1;
      applyViewPose(VIEW_PRESETS[camView.index]);
      syncViewLabel();
      controls.update();
      return { size, center: new THREE.Vector3(0, 0, 0) };
    }

    function prepareParts(root) {
      parts = [];
      const meshes = [];
      root.updateMatrixWorld(true);
      root.traverse((obj) => {
        if (!isBrainMesh(obj)) return;
        meshes.push(obj);
        obj.castShadow = false;
        obj.receiveShadow = false;
        obj.userData.region = classifyRegion(obj.name);
      });

      // 内外・サイズを測ってから透過を決める
      const _box = new THREE.Box3();
      const _size = new THREE.Vector3();
      const _center = new THREE.Vector3();
      const worldCenters = [];
      let maxRadius = 1e-6;
      let maxExtent = 1e-6;
      const centroid = new THREE.Vector3();

      for (const mesh of meshes) {
        mesh.getWorldPosition(_center);
        worldCenters.push(_center.clone());
        centroid.add(_center);
        _box.setFromObject(mesh);
        _box.getSize(_size);
        const extent = Math.max(_size.x, _size.y, _size.z);
        maxExtent = Math.max(maxExtent, extent);
      }
      const nMesh = Math.max(meshes.length, 1);
      centroid.multiplyScalar(1 / nMesh);
      for (const c of worldCenters) {
        maxRadius = Math.max(maxRadius, c.distanceTo(centroid));
      }

      for (let i = 0; i < meshes.length; i++) {
        const obj = meshes[i];
        const region = obj.userData.region;
        const outerness = worldCenters[i].distanceTo(centroid) / maxRadius;
        _box.setFromObject(obj);
        _box.getSize(_size);
        const extent = Math.max(_size.x, _size.y, _size.z);
        const sizeNorm = extent / maxExtent;
        const look = shellLookForPart(region, outerness, sizeNorm);
        obj.userData.outerness = outerness;
        obj.userData.sizeNorm = sizeNorm;
        // 内側を後描画 → 透過外殻の奥に核が見える
        // 白質は内側・後描画しない（皮質ヒダを遮らない）
        obj.renderOrder =
          region === "white"
            ? -20
            : Math.round((1 - outerness) * 40 + sizeNorm * -8);

        const srcMats = Array.isArray(obj.material) ? obj.material : [obj.material];
        const outMats = srcMats.map((src) => {
          if (!src) return src;
          const mat = src.clone();
          mat.side = THREE.DoubleSide;
          mat.transparent = true;
          mat.depthWrite = look.depthWrite;
          mat.opacity = look.face;
          mat.userData.shellAlphaRegion = isShellAlphaRegion(region) ? region : null;
          mat.userData.isCortex = region === "cortex";
          softenHologramTransmission(mat, look);
          if (mat.emissiveIntensity !== undefined) {
            mat.userData.baseEmissive = Math.min(mat.emissiveIntensity || 1, 0.85);
            mat.emissiveIntensity = mat.userData.baseEmissive * 0.22;
          }
          if (mat.roughness !== undefined) mat.roughness = 0.28;
          if (mat.metalness !== undefined) mat.metalness = 0.22;
          if (mat.envMapIntensity !== undefined) mat.envMapIntensity = 1.2;
          if (mat.isMeshPhysicalMaterial) {
            mat.clearcoat = 0.55;
            mat.clearcoatRoughness = 0.2;
          }
          mat.userData.pendingShell = look;
          mat.userData.shellLookBase = { ...look };
          patchElectricMaterial(mat);
          applyShellUniforms(mat, look);
          mat.needsUpdate = true;
          return mat;
        });
        obj.material = outMats.length === 1 ? outMats[0] : outMats;
        if (region === "white") obj.visible = whiteAlphaDebug.visible;
      }

      // 稲妻用サンプルは集合姿勢のまま取得（脳のみ）
      lightning.samples = collectSurfaceSamples(root);

      const n = meshes.length;
      const assembledWorld = meshes.map((m) => {
        const p = new THREE.Vector3();
        m.getWorldPosition(p);
        return p;
      });

      // 中央→外側へ収束（内側が先に着地）
      const outernessOf = meshes.map((_, i) =>
        worldCenters[i].distanceTo(centroid) / maxRadius
      );
      const order = Array.from({ length: n }, (_, i) => i);
      order.sort((a, b) => {
        const da = outernessOf[a] + (Math.random() - 0.5) * 0.04;
        const db = outernessOf[b] + (Math.random() - 0.5) * 0.04;
        return da - db;
      });

      const batchOf = new Array(n);
      let batchIndex = 0;
      let inBatch = 0;
      let batchSize = BATCH_MIN + Math.floor(Math.random() * (BATCH_MAX - BATCH_MIN + 1));
      for (const meshIdx of order) {
        batchOf[meshIdx] = batchIndex;
        inBatch += 1;
        if (inBatch >= batchSize) {
          batchIndex += 1;
          inBatch = 0;
          batchSize = BATCH_MIN + Math.floor(Math.random() * (BATCH_MAX - BATCH_MIN + 1));
        }
      }
      const batchCount = n ? Math.max(...batchOf) + 1 : 1;
      const flight = Math.max(PART_FLIGHT, 3.2 / Math.max(batchCount, 1));

      meshes.forEach((mesh, i) => {
        const assembledLocal = mesh.parent
          ? mesh.parent.worldToLocal(assembledWorld[i].clone())
          : assembledWorld[i].clone();

        // 放射方向から画面外へ（レーン接近用）
        const dir = assembledWorld[i].clone().sub(centroid);
        if (dir.lengthSq() < 1e-8) {
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          dir.set(
            Math.sin(phi) * Math.cos(theta),
            Math.sin(phi) * Math.sin(theta),
            Math.cos(phi)
          );
        } else {
          dir.normalize();
        }
        // 横ズレは控えめ → 直線的で重いレーン
        _ref.set(0, 1, 0);
        if (Math.abs(dir.dot(_ref)) > 0.85) _ref.set(1, 0, 0);
        _lat.crossVectors(dir, _ref).normalize();
        const side = (Math.random() < 0.5 ? -1 : 1) * (0.22 + Math.random() * 0.35);
        dir.addScaledVector(_lat, side * 0.18).normalize();

        const dist = OFFSCREEN_DIST * (0.95 + Math.random() * 0.35);
        const explodedWorld = centroid.clone().add(dir.clone().multiplyScalar(dist));
        const explodedLocal = mesh.parent
          ? mesh.parent.worldToLocal(explodedWorld)
          : explodedWorld;

        // ゆるいカーブ用の中間点（スナップ用ホールドは使わない）
        _dir.subVectors(assembledLocal, explodedLocal);
        const travel = _dir.length();
        _dir.multiplyScalar(1 / Math.max(travel, 1e-6));
        const mid = explodedLocal.clone().lerp(assembledLocal, 0.42);
        _ref.set(0, 1, 0);
        if (Math.abs(_dir.dot(_ref)) > 0.85) _ref.set(1, 0, 0);
        _lat.crossVectors(_dir, _ref).normalize();
        const bendLocal = mid.addScaledVector(
          _lat,
          (Math.random() < 0.5 ? -1 : 1) * travel * (0.03 + Math.random() * 0.05)
        );

        const outer = THREE.MathUtils.clamp(outernessOf[i], 0, 1);
        const b = batchOf[i];
        // バッチ波 + 半径に応じた追加遅延で「核→殻」の流れを強調
        const wave =
          batchCount <= 1 ? 0 : (b / (batchCount - 1)) * (1 - flight) * 0.72;
        const radial = outer * (1 - flight) * 0.28;
        const delay = wave + radial;
        const micro = (Math.random() - 0.5) * flight * 0.04;

        const spinAxis = new THREE.Vector3(
          Math.random() - 0.5,
          Math.random() - 0.5,
          Math.random() - 0.5
        ).normalize();
        const spinAmount = (Math.PI * (0.08 + Math.random() * 0.16)) * (Math.random() < 0.5 ? 1 : -1);

        const baseScale = mesh.scale.clone();
        const baseQuat = mesh.quaternion.clone();
        const approachQuat = baseQuat.clone();
        _spinQ.setFromAxisAngle(spinAxis, spinAmount);
        approachQuat.multiply(_spinQ);

        parts.push({
          mesh,
          region: mesh.userData.region || classifyRegion(mesh.name),
          assembled: assembledLocal,
          exploded: explodedLocal,
          bend: bendLocal,
          delay: Math.max(0, delay + micro),
          flight,
          baseScale,
          baseQuat,
          approachQuat,
        });

        mesh.position.copy(explodedLocal);
        mesh.scale.copy(baseScale).multiplyScalar(0.55);
        mesh.visible = false;
      });

      partCountEl.textContent = `Brain ${parts.length}`;
      return parts.length;
    }

    function setProgressVisual(p) {
      const now = performance.now();
      if (now - _progressUiAt < 50 && p > 0.02 && p < 0.98) return;
      _progressUiAt = now;
      progressBar.style.width = `${Math.round(p * 100)}%`;
      const label =
        p < 0.02 ? "State: Dispersed" :
        p > 0.98 ? "State: Assembled" :
        `State: ${Math.round(p * 100)}%`;
      stateLabel.textContent = label;
      if (debugMiniLabel) debugMiniLabel.textContent = label;
      if (dialogStatusLabel) dialogStatusLabel.textContent = label;
    }

    function applyAssembleProgress(globalT) {
      let sum = 0;
      let allLanded = parts.length > 0;
      for (const part of parts) {
        const flight = part.flight || PART_FLIGHT;
        let local;
        if (anim.syncParts) {
          // 一斉飛散: 遅延なし、加速して飛び散る
          const leave = THREE.MathUtils.clamp(1 - globalT, 0, 1);
          local = 1 - easeInQuint(leave);
        } else {
          local = THREE.MathUtils.clamp(
            (globalT - part.delay) / Math.max(flight, 0.001),
            0,
            1
          );
        }
        if (!anim.syncParts && local < 0.985) allLanded = false;
        part.mesh.visible = local > 0.001;

        sampleApproach(part.exploded, part.bend, part.assembled, local, _pos, !anim.syncParts);
        part.mesh.position.copy(_pos);

        const ease = anim.syncParts ? local : easeOutCubic(local);
        const land = anim.syncParts ? local : Math.min(1, easeOutBack(local));
        const s = THREE.MathUtils.lerp(0.55, 1.0, Math.min(1, land));
        part.mesh.scale.copy(part.baseScale).multiplyScalar(s);
        part.mesh.quaternion.copy(part.approachQuat).slerp(part.baseQuat, ease);

        const mats = Array.isArray(part.mesh.material) ? part.mesh.material : [part.mesh.material];
        for (const mat of mats) {
          if (mat && mat.emissiveIntensity !== undefined) {
            const base = mat.userData.baseEmissive ?? 1;
            mat.emissiveIntensity = THREE.MathUtils.lerp(base * 0.35, base * 0.9, ease);
          }
        }
        sum += ease;
      }
      const avg = parts.length ? sum / parts.length : globalT;
      anim.timeline = globalT;
      anim.progress = avg;
      if (anim.active && !anim.syncParts && anim.to >= 0.99 && allLanded) {
        if (!anim.partsLandedAt) anim.partsLandedAt = performance.now();
      }
      setProgressVisual(avg);
      return avg;
    }

    function startAnim(toAssembled) {
      setCalloutsLocked(false);
      if (toAssembled) {
        randomizeBrainLook();
        brainLookMode = "flight";
        applyBrainPalette(activePalette);
        if (headGlowOn) applyHeadGlow(false);
        anim.neonPrewarmed = false;
      } else {
        anim.neonPrewarmed = false;
        if (headGlowOn) applyHeadGlow(false);
        brainLookMode = "flight";
        applyBrainPalette(activePalette);
      }

      setOrbitControlsEnabled(false);

      anim.active = true;
      anim.from = anim.timeline;
      anim.to = toAssembled ? 1 : 0;
      anim.syncParts = !toAssembled;
      anim.duration = toAssembled ? ANIM_DURATION : DISPERSE_DURATION;
      anim.t0 = performance.now();
      anim.partsLandedAt = 0;
      if (toAssembled) anim.neonPrewarmed = false;

      if (!toAssembled) clearLightningBolts();
    }

    function finishAnim() {
      const completedAssemble = anim.to >= 0.99;
      anim.active = false;
      anim.timeline = anim.to;
      anim.progress = anim.to;
      applyAssembleProgress(anim.to);
      if (completedAssemble) {
        controls.enableDamping = false;
        controls.enabled = false;
        setBrainLookMode("neon", { force: true });
        applyHeadGlow(true);
        triggerCombineFlash();
      } else {
        setOrbitControlsEnabled(true);
        brainLookMode = "flight";
        applyBrainPalette(activePalette);
      }
      if (anim.loop) {
        const wait = completedAssemble ? 3200 : 700;
        setTimeout(() => startAnim(anim.timeline < 0.5), wait);
      }
    }


    // Bottom HUD controls — loop starts OFF; no auto-start on load
    anim.loop = false;
    if (btnToggle) {
      btnToggle.classList.remove("primary");
      btnToggle.textContent = "Auto Loop";
    }

    function onAssembleClick() {
      anim.loop = false;
      btnToggle?.classList.remove("primary");
      if (btnToggle) btnToggle.textContent = "Auto Loop";
      startAnim(true);
    }
    function onExplodeClick() {
      anim.loop = false;
      btnToggle?.classList.remove("primary");
      if (btnToggle) btnToggle.textContent = "Auto Loop";
      startAnim(false);
    }
    function onViewClick() {
      cycleCameraView();
    }
    btnAssemble?.addEventListener("click", onAssembleClick);
    btnExplode?.addEventListener("click", onExplodeClick);
    btnAssembleMini?.addEventListener("click", onAssembleClick);
    btnExplodeMini?.addEventListener("click", onExplodeClick);
    btnView?.addEventListener("click", onViewClick);
    btnViewMini?.addEventListener("click", onViewClick);
    btnToggle?.addEventListener("click", () => {
      anim.loop = !anim.loop;
      btnToggle.classList.toggle("primary", anim.loop);
      btnToggle.textContent = anim.loop ? "Loop ON" : "Auto Loop";
      if (anim.loop && !anim.active) {
        startAnim(anim.timeline < 0.5);
      }
    });
    btnHudToggle?.addEventListener("click", () => {
      if (!controlsPanel) return;
      const collapsed = controlsPanel.classList.toggle("is-collapsed");
      btnHudToggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
      btnHudToggle.title = collapsed ? "メニューを展開" : "メニューを最小化";
      btnHudToggle.textContent = collapsed ? "+" : "−";
      const chromeActions = controlsPanel.querySelector(".controls-chrome-actions");
      if (chromeActions) chromeActions.setAttribute("aria-hidden", collapsed ? "false" : "true");
    });
    btnArc?.addEventListener("click", () => {
      if (anim.progress < 0.5) {
        applyAssembleProgress(1);
        anim.timeline = 1;
        anim.progress = 1;
        setProgressVisual(1);
      }
      triggerCombineFlash();
    });
    btnHeadGlow?.addEventListener("click", () => {
      applyHeadGlow(!headGlowOn);
    });
    palettePresetEl?.addEventListener("change", () => {
      setPalettePreset(palettePresetEl.value);
    });
    btnRandomLook?.addEventListener("click", () => {
      randomizeBrainLook();
    });

    const loader = new GLTFLoader();
    setStatus("Loading", "loading");

    const brainUrl =
      (window.KINSHO_MEDIA && window.KINSHO_MEDIA.noumaiBrain) ||
      "./head_allen_fit.glb";

    loader.load(
      brainUrl,
      (gltf) => {
        modelRoot = gltf.scene;
        scene.add(modelRoot);
        frameObject(modelRoot);
        setupHead(modelRoot);
        prepareParts(modelRoot);
        computeBrainWindow(modelRoot);
        syncHeadBrainWindow();
        randomizeBrainLook();
        brainLookMode = "flight";
        applyBrainPalette(activePalette);
        applyCortexAlphaDebug();
        applyAssembleProgress(0);
        initLightning(modelRoot);
        buildPaletteUI();
        if (palettePresetEl) {
          palettePresetEl.disabled = false;
          palettePresetEl.value = "custom";
        }
        for (const el of [
          btnAssemble, btnExplode, btnAssembleMini, btnExplodeMini,
          btnView, btnViewMini, btnToggle, btnArc, btnHeadGlow, btnRandomLook,
        ]) {
          if (el) el.disabled = false;
        }
        loaderEl.classList.add("hide");
        setStatus("Ready", "ok");
        if (partCountEl) {
          partCountEl.textContent =
            `Brain ${parts.length}` + (headMesh ? " · Head 1" : "");
        }
        // Idle after load: dispersed ready state — no auto-assemble / no auto-loop
        anim.loop = false;
        if (btnToggle) {
          btnToggle.classList.remove("primary");
          btnToggle.textContent = "Auto Loop";
        }
      },
      (ev) => {
        if (ev.total) setStatus(`Load ${Math.round((ev.loaded / ev.total) * 100)}%`, "loading");
      },
      (err) => {
        console.error(err);
        loaderEl.classList.add("hide");
        setStatus("Error", "error");
      }
    );

    function onResize() {
      const w = wrap.clientWidth || window.innerWidth;
      const h = wrap.clientHeight || window.innerHeight;
      if (w < 1 || h < 1) return;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(w, h, false);
      labelRenderer.setSize(w, h);
      composer.setSize(w, h);
      bloom.setSize(w, h);
    }
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", () => setTimeout(onResize, 180));
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onResize);
    }

    function animate(now) {
      requestAnimationFrame(animate);
      if (anim.active) {
        const elapsed = (now - anim.t0) / 1000;
        const u = Math.min(1, elapsed / anim.duration);
        const g = THREE.MathUtils.lerp(anim.from, anim.to, u);
        applyAssembleProgress(g);
        const landScanReady =
          anim.to >= 0.99 &&
          anim.partsLandedAt > 0 &&
          now - anim.partsLandedAt >= anim.scanAfterLandMs;
        if (anim.to < 0.99) {
          if (u >= 1) finishAnim();
        } else if (u >= 1 || landScanReady) {
          finishAnim();
        }
      }
      updateCombineFlash(now);
      updateLightning(now);

      const tSec = now * 0.001;
      if (!combineFlash.active) {
        electricUniforms.uElectricTime.value = tSec;
      }

      // Head yaw always advances; camera orbit is independent (look only)
      updateHeadSpin(now);
      updateCamView(now);
      if (controls.enabled && !anim.active && !combineFlash.active && !camView.lerping && !camFocus.active) {
        controls.update();
      }
      updateCamFocus(now);
      updateCalloutOverlay(now);
      composer.render();
      labelRenderer.render(scene, camera);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
